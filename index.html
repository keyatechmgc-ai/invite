<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahmoud & Eman | Save The Date</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700;800&family=Raleway:wght@300;400;500;600;700;800&family=Tajawal:wght@400;500;700;800;900&family=El+Messiri:wght@400;500;600;700&family=Changa:wght@400;500;600;700;800&family=Almarai:wght@400;700;800&family=Reem+Kufi:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #e8a0b4;
            --pink-light: #f2c8d4;
            --pink-dark: #c47d8b;
            --pink-soft: #f9e4ea;
            --pink-pale: #fdf5f7;
            --pink-medium: #e8b4c4;
            --white: #ffffff;
            --dark: #3d2c30;
            --dark-soft: #5c4549;
            --gold: #c9a87c;
            --gold-light: #e8d9c5;
            --gold-dark: #b8946a;
            --gold-bright: #d4b896;
            --gold-shimmer: #f0e5d8;
            --cream: #fdf8f5;
            --shadow-envelope: 0 40px 100px rgba(60,44,48,0.2), 0 15px 40px rgba(196,125,139,0.15);
            --shadow-flap: 0 15px 50px rgba(60,44,48,0.25);
            --shadow-seal: 0 10px 35px rgba(196,125,139,0.5), inset 0 3px 0 rgba(255,255,255,0.3);
            --gradient-envelope: linear-gradient(165deg, #fdf5f7 0%, #f9e4ea 25%, #f2c8d4 50%, #f5d5de 75%, #fdf5f7 100%);
            --gradient-flap: linear-gradient(170deg, #f9e4ea 0%, #f2c8d4 20%, #e8b4c4 50%, #e8a0b4 80%, #f2c8d4 100%);
            --gradient-seal: linear-gradient(135deg, #c9a87c 0%, #e8d9c5 30%, #c9a87c 60%, #b8946a 100%);
            --gradient-gold-trim: linear-gradient(180deg, #e8d9c5 0%, #c9a87c 50%, #b8946a 100%);
            --names-font: 'Cormorant Garamond', serif;
            --main-font: 'Cairo', sans-serif;
            --script-font: 'Great Vibes', cursive;
            --ai-transition: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ai-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--main-font);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3d2c30;
        }

        /* ============ DRAG & DROP OVERLAY ============ */
        .drag-drop-overlay {
            position: fixed;
            inset: 0;
            z-index: 99998;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
        }

        .drag-drop-overlay.active {
            display: flex;
            pointer-events: all;
        }

        .drag-drop-zone {
            width: 300px;
            height: 200px;
            border: 3px dashed var(--gold-light);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .drag-drop-zone.drag-over {
            border-color: white;
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        /* ============ UPLOAD PROGRESS ============ */
        .upload-progress-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 99999;
            background: rgba(0,0,0,0.9);
            padding: 30px 40px;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 300px;
        }

        .upload-progress-container.active {
            display: flex;
        }

        .upload-progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .upload-progress-fill {
            height: 100%;
            background: var(--gradient-gold-trim);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .upload-progress-text {
            color: white;
            font-size: 0.9rem;
        }

        /* ============ SETTINGS PANEL ============ */
        #settingsPanel {
            position: fixed;
            inset: 0;
            z-index: 100000;
            background: rgba(0,0,0,0.92);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(15px);
        }

        #settingsPanel.active {
            display: flex;
        }

        .settings-card {
            background: linear-gradient(165deg, #2d1823 0%, #1a0a0f 100%);
            border-radius: 30px;
            padding: 35px 25px;
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(201,168,124,0.3);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .settings-title {
            text-align: center;
            color: var(--gold-light);
            font-family: var(--names-font);
            font-size: 1.8rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .settings-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: white;
            font-family: var(--main-font);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .settings-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,124,0.1);
            background: rgba(255,255,255,0.1);
        }

        .settings-input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .settings-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: var(--main-font);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: white;
        }

        .settings-btn.upload-btn {
            background: linear-gradient(135deg, #c9a87c, #b8946a);
        }

        .settings-btn.preview-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .settings-btn.reset-btn {
            background: linear-gradient(135deg, #f5576c, #c44569);
        }

        .settings-btn.save-btn {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: #1a0a0f;
        }

        .settings-btn.close-btn {
            background: rgba(255,255,255,0.1);
        }

        .settings-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .settings-preview {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            margin: 10px 0;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .settings-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 20px 0;
        }

        .settings-status {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-top: 10px;
        }

        /* ============ FLORAL BACKGROUND ============ */
        .floral-bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .floral-bg-image {
            position: absolute;
            inset: -5%;
            width: 110%;
            height: 110%;
            object-fit: cover;
            z-index: 0;
            animation: bgSlowZoom 25s ease-in-out infinite alternate;
            transition: opacity 1.5s ease;
        }

        @keyframes bgSlowZoom {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.06) rotate(1deg); }
        }

        .floral-bg-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at 30% 50%, rgba(255,245,247,0.2) 0%, rgba(255,245,247,0.5) 30%, rgba(196,125,139,0.4) 60%, rgba(60,44,48,0.75) 100%);
        }

        .floral-bg-vignette {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(60,44,48,0.8) 100%);
            pointer-events: none;
        }

        /* ============ AI GLOW FOLLOWER ============ */
        .ai-glow-follower {
            position: fixed;
            pointer-events: none;
            z-index: 4;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,160,180,0.12) 0%, rgba(232,160,180,0.04) 35%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .ai-glow-follower.active { opacity: 1; }

        /* ============ AI PARTICLES CANVAS ============ */
        #aiParticlesCanvas {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0.75;
        }

        /* ============ AI SPARKLES ============ */
        .ai-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 6;
            animation: sparkleAnimation var(--sparkle-duration) ease-out forwards;
        }

        @keyframes sparkleAnimation {
            0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; transform: translate(0,0) scale(1.3) rotate(45deg); }
            100% { transform: translate(var(--sparkle-tx), var(--sparkle-ty)) scale(0) rotate(var(--sparkle-rot)); opacity: 0; }
        }

        /* ============ GOLDEN FLOATING PARTICLES ============ */
        .golden-particle {
            position: fixed;
            pointer-events: none;
            z-index: 7;
            animation: goldenFloat var(--particle-duration) ease-in-out infinite;
            animation-delay: var(--particle-delay);
        }

        @keyframes goldenFloat {
            0%,100% { transform: translateY(0) translateX(0) rotate(0deg) scale(1); opacity: 0.2; }
            20% { transform: translateY(-30px) translateX(20px) rotate(72deg) scale(1.3); opacity: 0.7; }
            40% { transform: translateY(-70px) translateX(-15px) rotate(144deg) scale(1); opacity: 0.5; }
            60% { transform: translateY(-50px) translateX(-30px) rotate(216deg) scale(1.2); opacity: 0.6; }
            80% { transform: translateY(-20px) translateX(10px) rotate(288deg) scale(1.1); opacity: 0.4; }
        }

        /* ============ LIGHT RAYS ============ */
        .light-rays-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .light-rays-container.visible { opacity: 0.6; }

        .light-ray {
            position: absolute;
            top: -50%;
            left: 50%;
            width: 2px;
            height: 150%;
            background: linear-gradient(180deg, rgba(232,217,197,0.4) 0%, rgba(232,217,197,0.1) 50%, transparent 100%);
            transform-origin: bottom center;
            animation: lightRayRotate var(--ray-duration) linear infinite;
            animation-delay: var(--ray-delay);
        }

        @keyframes lightRayRotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* ============ MAIN ENVELOPE CONTAINER ============ */
        .envelope-stage {
            position: relative;
            z-index: 10;
            perspective: 1500px;
            perspective-origin: 50% 50%;
            animation: stageFloat 7s ease-in-out infinite;
        }

        @keyframes stageFloat {
            0%,100% { transform: translateY(0) rotateX(0deg); }
            20% { transform: translateY(-8px) rotateX(2deg); }
            40% { transform: translateY(3px) rotateX(-1deg); }
            60% { transform: translateY(-5px) rotateX(1deg); }
            80% { transform: translateY(6px) rotateX(-2deg); }
        }

        .envelope-floor-shadow {
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            width: 115%;
            height: 65px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.2) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: shadowDynamic 4s ease-in-out infinite;
        }

        @keyframes shadowDynamic {
            0%,100% { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 0.75; }
            50% { transform: translateX(-50%) scaleX(1.12) scaleY(0.85); opacity: 0.95; }
        }

        /* Floral Decorations */
        .floral-decor {
            position: absolute;
            pointer-events: none;
            z-index: 11;
        }

        .floral-decor-top {
            top: -80px; left: 50%; transform: translateX(-50%);
            animation: floralSwayTop 6s ease-in-out infinite;
        }
        @keyframes floralSwayTop {
            0%,100% { transform: translateX(-50%) rotate(0deg) scale(1); }
            30% { transform: translateX(calc(-50% + 10px)) rotate(4deg) scale(1.05); }
            70% { transform: translateX(calc(-50% - 10px)) rotate(-4deg) scale(0.97); }
        }

        .floral-decor-left {
            top: 28%; left: -70px;
            animation: floralSwayLeft 7s ease-in-out infinite;
        }
        @keyframes floralSwayLeft {
            0%,100% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-15px) rotate(6deg); }
            80% { transform: translateY(8px) rotate(-3deg); }
        }

        .floral-decor-right {
            top: 28%; right: -70px;
            animation: floralSwayRight 7s ease-in-out infinite;
            animation-delay: 1.5s;
        }
        @keyframes floralSwayRight {
            0%,100% { transform: translateY(0) rotate(0deg) scaleX(-1); }
            40% { transform: translateY(-15px) rotate(-6deg) scaleX(-1); }
            80% { transform: translateY(8px) rotate(3deg) scaleX(-1); }
        }

        .floral-decor-bottom {
            bottom: -60px; left: 50%; transform: translateX(-50%);
            animation: floralSwayBottom 6.5s ease-in-out infinite;
            animation-delay: 0.8s;
        }
        @keyframes floralSwayBottom {
            0%,100% { transform: translateX(-50%) rotate(0deg) scale(1); }
            33% { transform: translateX(calc(-50% + 8px)) rotate(3deg) scale(1.04); }
            66% { transform: translateX(calc(-50% - 8px)) rotate(-3deg) scale(0.96); }
        }

        /* 3D Envelope */
        .envelope-3d-container {
            position: relative;
            width: 390px;
            width: min(86vw, 410px);
            height: 280px;
            height: min(44vh, 300px);
            transform-style: preserve-3d;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.6s var(--ai-transition);
        }

        .envelope-3d-container:hover { transform: scale(1.02); }
        .envelope-3d-container.user-interacting { transform: scale(1.03); }

        .envelope-back-panel {
            position: absolute;
            inset: 0;
            background: var(--gradient-envelope);
            border-radius: 22px;
            transform: translateZ(-18px);
            box-shadow: var(--shadow-envelope);
            z-index: 0;
            border: 2.5px solid rgba(196,125,139,0.1);
            overflow: hidden;
        }

        .envelope-back-panel::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 2px solid rgba(196,125,139,0.06);
            border-radius: 16px;
            pointer-events: none;
        }

        .envelope-back-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: repeating-linear-gradient(45deg, var(--pink-dark) 0, var(--pink-dark) 1px, transparent 0, transparent 15px), repeating-linear-gradient(-45deg, var(--pink-dark) 0, var(--pink-dark) 1px, transparent 0, transparent 15px);
            pointer-events: none;
            z-index: 0;
        }

        .envelope-body-lower {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(253,245,247,0.88) 20%, rgba(249,228,234,0.82) 50%, rgba(242,200,212,0.78) 100%);
            border-radius: 0 0 22px 22px;
            transform: translateZ(2px);
            box-shadow: 0 12px 40px rgba(60,44,48,0.13);
            z-index: 2;
            border: 2px solid rgba(196,125,139,0.08);
            border-top: none;
            overflow: hidden;
            backdrop-filter: blur(3px);
        }

        .envelope-vcut {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 42px solid transparent;
            border-right: 42px solid transparent;
            border-top: 34px solid rgba(249,228,234,0.88);
            z-index: 3;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.07));
        }

        .envelope-vcut-gold {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 44px solid transparent;
            border-right: 44px solid transparent;
            border-top: 36px solid rgba(201,168,124,0.35);
            z-index: 2;
            pointer-events: none;
        }

        .envelope-body-pattern {
            position: absolute;
            inset: 18px;
            border: 2px dashed rgba(196,125,139,0.12);
            border-radius: 14px;
            pointer-events: none;
            z-index: 1;
        }

        .envelope-body-pattern::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1.5px dotted rgba(201,168,124,0.1);
            border-radius: 10px;
        }

        .gold-corner-ornament {
            position: absolute;
            width: 30px; height: 30px;
            pointer-events: none;
            z-index: 4;
            opacity: 0.5;
        }
        .gold-corner-ornament.top-left { top: 20px; left: 20px; }
        .gold-corner-ornament.top-right { top: 20px; right: 20px; transform: scaleX(-1); }
        .gold-corner-ornament.bottom-left { bottom: 20px; left: 20px; transform: scaleY(-1); }
        .gold-corner-ornament.bottom-right { bottom: 20px; right: 20px; transform: scale(-1,-1); }

        .envelope-flap-royal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 59%;
            background: var(--gradient-flap);
            border-radius: 22px 22px 58% 58%;
            transform-origin: top center;
            transform: translateZ(10px);
            transition: transform 0.9s var(--ai-bounce);
            box-shadow: var(--shadow-flap);
            z-index: 6;
            cursor: grab;
            touch-action: none;
            overflow: hidden;
        }

        .envelope-flap-royal:active { cursor: grabbing; }

        .envelope-flap-royal.opened {
            transform: rotateX(-178deg) translateZ(10px);
            border-radius: 22px 22px 0 0;
            box-shadow: 0 30px 70px rgba(60,44,48,0.35);
        }

        .envelope-flap-royal::before {
            content: '';
            position: absolute;
            inset: 14px;
            border: 2px solid rgba(255,255,255,0.38);
            border-radius: 16px 16px 48% 48%;
            pointer-events: none;
        }

        .envelope-flap-royal::after {
            content: '';
            position: absolute;
            inset: 26px;
            border: 1.5px solid rgba(255,255,255,0.22);
            border-radius: 12px 12px 40% 40%;
            pointer-events: none;
        }

        .flap-floral-embroidery {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
            animation: embroideryShimmer 3s ease-in-out infinite;
        }

        @keyframes embroideryShimmer {
            0%,100% { opacity: 0.3; }
            50% { opacity: 0.55; }
        }

        .flap-gold-trim {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-gold-trim);
            z-index: 7;
            pointer-events: none;
            opacity: 0.8;
            box-shadow: 0 2px 8px rgba(201,168,124,0.4);
        }

        .letter-inside-envelope {
            position: absolute;
            left: 20px;
            right: 20px;
            top: 35%;
            height: 48%;
            background: linear-gradient(180deg, #ffffff 0%, #fefcfb 40%, #fdf8f7 100%);
            border-radius: 14px;
            z-index: 1;
            transition: transform 0.9s var(--ai-bounce);
            box-shadow: 0 10px 35px rgba(60,44,48,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateZ(0);
            border: 1.5px solid rgba(196,125,139,0.06);
            overflow: hidden;
        }

        .letter-inside-envelope.revealed {
            transform: translateY(-40%) translateZ(0);
            box-shadow: 0 22px 60px rgba(60,44,48,0.25);
        }

        .letter-inside-envelope::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(196,125,139,0.02) 4px, rgba(196,125,139,0.02) 5px);
            pointer-events: none;
        }

        .letter-inside-envelope::after {
            content: '';
            position: absolute;

    <script>
        // ============ FIREBASE CONFIG ============
        const firebaseConfig = {
            apiKey: "AIzaSyCF-kh6JgAbhroue7cKRdMZjwYV8m2c6Uw",
            authDomain: "engagmen.firebaseapp.com",
            databaseURL: "https://engagmen-default-rtdb.firebaseio.com",
            projectId: "engagmen",
            storageBucket: "engagmen.firebasestorage.app",
            messagingSenderId: "286100738965",
            appId: "1:286100738965:web:3f5be0307dca5927e5dc9c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============ CLOUDINARY CONFIG ============
        const CLOUDINARY_CLOUD_NAME = 'dsuv6suzb';
        const CLOUDINARY_UPLOAD_PRESET = 'wedding_upload';
        const CLOUDINARY_API_KEY = '787575682743426';
        const CLOUDINARY_FOLDER = 'envelope-backgrounds';

        // ============ GLOBAL STATE ============
        let flapOpen = false;
        let isAnimating = false;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let userInteracting = false;
        let lastInteraction = Date.now();
        let interactionIntensity = 0;
        let sealClickCount = 0;
        let sealClickTimer = null;
        let currentBgUrl = 'https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg';
        const DEFAULT_BG_URL = 'https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg';

        // ============ AI GLOW FOLLOWER ============
        function initAIGlowFollower() {
            const glow = document.getElementById('aiGlowFollower');
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                glow.style.left = `${mouseX}px`; glow.style.top = `${mouseY}px`;
                glow.classList.add('active'); updateUserActivity();
            });
            document.addEventListener('touchmove', (e) => {
                mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
                glow.style.left = `${mouseX}px`; glow.style.top = `${mouseY}px`;
                glow.classList.add('active'); updateUserActivity();
            }, { passive: true });
            document.addEventListener('mouseleave', () => { glow.classList.remove('active'); userInteracting = false; });
            document.addEventListener('touchend', () => { glow.classList.remove('active'); userInteracting = false; });
        }

        function updateUserActivity() {
            userInteracting = true;
            lastInteraction = Date.now();
            interactionIntensity = Math.min(1, interactionIntensity + 0.2);
            clearTimeout(window.activityTimeout);
            window.activityTimeout = setTimeout(() => { userInteracting = false; interactionIntensity = 0; }, 2000);
        }

        // ============ AI PARTICLES ============
        function initAIParticles() {
            const canvas = document.getElementById('aiParticlesCanvas');
            const ctx = canvas.getContext('2d');
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            const particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    size: Math.random() * 3.5 + 0.5, speedX: (Math.random() - 0.5) * 0.35,
                    speedY: (Math.random() - 0.5) * 0.25, color: Math.random() > 0.5 ? '232,160,180' : '201,168,124',
                    opacity: Math.random() * 0.45 + 0.06, phase: Math.random() * Math.PI * 2,
                    oscSpeed: Math.random() * 0.012 + 0.004, baseSpeedX: (Math.random() - 0.5) * 0.35,
                    baseSpeedY: (Math.random() - 0.5) * 0.25
                });
            }
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.phase += p.oscSpeed;
                    if (userInteracting) {
                        const dx = p.x - mouseX, dy = p.y - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200) {
                            const force = (1 - dist / 200) * interactionIntensity * 2;
                            p.speedX += (dx / dist) * force * 0.3;
                            p.speedY += (dy / dist) * force * 0.3;
                        }
                    }
                    p.speedX += (p.baseSpeedX - p.speedX) * 0.02;
                    p.speedY += (p.baseSpeedY - p.speedY) * 0.02;
                    p.x += p.speedX + Math.sin(p.phase) * 0.25;
                    p.y += p.speedY + Math.cos(p.phase) * 0.2;
                    if (p.x < -50) p.x = canvas.width + 50;
                    if (p.x > canvas.width + 50) p.x = -50;
                    if (p.y < -50) p.y = canvas.height + 50;
                    if (p.y > canvas.height + 50) p.y = -50;
                    ctx.save();
                    ctx.globalAlpha = p.opacity + Math.sin(p.phase) * 0.12;
                    ctx.fillStyle = `rgba(${p.color},${p.opacity})`;
                    ctx.shadowBlur = 14; ctx.shadowColor = `rgba(${p.color},0.7)`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // ============ GOLDEN PARTICLES ============
        function initGoldenParticles() {
            const container = document.getElementById('goldenParticlesContainer');
            function create() {
                const p = document.createElement('div');
                p.className = 'golden-particle';
                const size = Math.random() * 5 + 2;
                p.style.cssText = `
                    left:${Math.random()*100}%;top:${Math.random()*100}%;
                    width:${size}px;height:${size}px;
                    background:radial-gradient(circle,rgba(232,217,197,0.95) 0%,rgba(201,168,124,0.6) 100%);
                    border-radius:50%;
                    --particle-duration:${Math.random()*7+7}s;
                    --particle-delay:${Math.random()*5}s;
                    box-shadow:0 0 ${size*4}px rgba(232,217,197,0.8),0 0 ${size*8}px rgba(201,168,124,0.4);
                `;
                container.appendChild(p);
                setTimeout(() => p.remove(), 12000);
            }
            for (let i = 0; i < 20; i++) setTimeout(create, i * 150);
            setInterval(create, 1200);
        }

        // ============ SPARKLES ============
        function createSparkle(x, y, count = 1) {
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'ai-sparkle';
                const size = Math.random() * 7 + 3;
                s.style.cssText = `
                    left:${x+(Math.random()-0.5)*30}px;top:${y+(Math.random()-0.5)*30}px;
                    width:${size}px;height:${size}px;
                    background:radial-gradient(circle,rgba(255,255,255,1) 0%,rgba(232,217,197,0.8) 50%,rgba(232,160,180,0) 100%);
                    border-radius:50%;
                    --sparkle-duration:${Math.random()*1.8+1.2}s;
                    --sparkle-tx:${(Math.random()-0.5)*100}px;
                    --sparkle-ty:${(Math.random()-0.5)*100-20}px;
                    --sparkle-rot:${(Math.random()-0.5)*220}deg;
                    box-shadow:0 0 ${size*3}px rgba(255,255,255,0.9),0 0 ${size*6}px rgba(232,217,197,0.6);
                `;
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 3000);
            }
        }

        // ============ ENVELOPE INTERACTION ============
        function initEnvelopeInteraction() {
            const flap = document.getElementById('envelopeFlapRoyal');
            const letter = document.getElementById('letterInside');
            const seal = document.getElementById('royalWaxSeal');
            const instruction = document.getElementById('envelopeInstruction');
            const container = document.getElementById('envelope3DContainer');
            
            let startY = 0, currentRotation = 0;
            const maxOpen = -178;
            
            function openFlap() {
                if (isAnimating || flapOpen) return;
                isAnimating = true; flapOpen = true;
                flap.classList.add('opened'); letter.classList.add('revealed');
                seal.classList.add('hidden'); seal.classList.add('paused');
                instruction.textContent = 'اضغط على الرسالة للمتابعة';
                const rect = container.getBoundingClientRect();
                for (let i = 0; i < 18; i++) {
                    setTimeout(() => createSparkle(rect.left+rect.width/2+(Math.random()-0.5)*250, rect.top+rect.height/2+(Math.random()-0.5)*200, 2), i*40);
                }
                setTimeout(() => { isAnimating = false; }, 900);
            }
            
            function closeFlap() {
                if (isAnimating || !flapOpen) return;
                isAnimating = true; flapOpen = false;
                flap.classList.remove('opened'); letter.classList.remove('revealed');
                seal.classList.remove('hidden'); seal.classList.remove('paused');
                instruction.textContent = 'اسحب الطرف الذهبي للأعلى لفتح الظرف';
                setTimeout(() => { isAnimating = false; }, 900);
            }
            
            flap.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY; flap.style.transition = 'none';
                container.classList.add('user-interacting'); updateUserActivity();
                createSparkle(e.touches[0].clientX, e.touches[0].clientY, 2);
            }, { passive: true });
            
            flap.addEventListener('touchmove', (e) => {
                const diff = startY - e.touches[0].clientY;
                const rotation = Math.max(maxOpen, Math.min(0, -diff * 1.6));
                flap.style.transform = `rotateX(${rotation}deg) translateZ(10px)`;
                currentRotation = rotation; updateUserActivity();
                if (rotation < -80) { letter.classList.add('revealed'); seal.classList.add('hidden'); seal.classList.add('paused'); }
                else { letter.classList.remove('revealed'); seal.classList.remove('hidden'); seal.classList.remove('paused'); }
                if (Math.random() > 0.6) createSparkle(e.touches[0].clientX, e.touches[0].clientY, 1);
            }, { passive: true });
            
            flap.addEventListener('touchend', () => {
                flap.style.transition = 'transform 0.9s cubic-bezier(0.34,1.56,0.64,1)';
                container.classList.remove('user-interacting');
                if (currentRotation < -60) openFlap(); else closeFlap();
                currentRotation = 0;
            });
            
            flap.addEventListener('mousedown', (e) => {
                startY = e.clientY; flap.style.transition = 'none';
                container.classList.add('user-interacting'); updateUserActivity();
                createSparkle(e.clientX, e.clientY, 3);
                document.addEventListener('mousemove', onMM); document.addEventListener('mouseup', onMU);
            });
            
            function onMM(e) {
                const diff = startY - e.clientY;
                const rotation = Math.max(maxOpen, Math.min(0, -diff * 1.6));
                flap.style.transform = `rotateX(${rotation}deg) translateZ(10px)`;
                currentRotation = rotation; updateUserActivity();
                if (rotation < -80) { letter.classList.add('revealed'); seal.classList.add('hidden'); seal.classList.add('paused'); }
                else { letter.classList.remove('revealed'); seal.classList.remove('hidden'); seal.classList.remove('paused'); }
                if (Math.random() > 0.5) createSparkle(e.clientX, e.clientY, 1);
            }
            
            function onMU() {
                flap.style.transition = 'transform 0.9s cubic-bezier(0.34,1.56,0.64,1)';
                container.classList.remove('user-interacting');
                document.removeEventListener('mousemove', onMM); document.removeEventListener('mouseup', onMU);
                if (currentRotation < -60) openFlap(); else closeFlap();
                currentRotation = 0;
            }
            
            letter.addEventListener('click', (e) => {
                if (flapOpen) {
                    for (let i = 0; i < 30; i++) setTimeout(() => createSparkle(e.clientX+(Math.random()-0.5)*400, e.clientY+(Math.random()-0.5)*400, 2), i*25);
                    document.getElementById('lightRaysContainer').classList.add('visible');
                    setTimeout(() => {
                        document.body.style.transition = 'opacity 1.8s ease';
                        document.body.style.opacity = '0';
                        setTimeout(() => { window.location.href = 'https://keyatechmgc-ai.github.io/invite/main.html'; }, 1800);
                    }, 600);
                }
            });
        }

        // ============ SEAL CLICK FOR SETTINGS ============
        function initSealSettings() {
            const seal = document.getElementById('royalWaxSeal');
            
            seal.addEventListener('click', (e) => {
                e.stopPropagation();
                sealClickCount++;
                clearTimeout(sealClickTimer);
                sealClickTimer = setTimeout(() => { sealClickCount = 0; }, 2000);
                
                if (sealClickCount >= 5) {
                    sealClickCount = 0;
                    openSettings();
                }
            });
            
            // Long press for mobile
            let longPressTimer;
            seal.addEventListener('touchstart', (e) => {
                longPressTimer = setTimeout(() => {
                    openSettings();
                }, 2500);
            });
            seal.addEventListener('touchend', () => clearTimeout(longPressTimer));
            seal.addEventListener('touchmove', () => clearTimeout(longPressTimer));
        }

        // ============ SETTINGS PANEL ============
        function openSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.add('active');
            document.getElementById('settingsBgUrl').value = currentBgUrl;
            document.getElementById('settingsGroom').value = document.getElementById('letterGroom').textContent;
            document.getElementById('settingsBride').value = document.getElementById('letterBride').textContent;
            document.getElementById('settingsDate').value = document.getElementById('letterDate').textContent.replace(/\s+/g, '');
            document.getElementById('settingsStatus').textContent = '';
            document.getElementById('settingsPreview').style.display = 'none';
        }

        function closeSettings() {
            document.getElementById('settingsPanel').classList.remove('active');
        }

        function previewBackground() {
            const url = document.getElementById('settingsBgUrl').value.trim();
            if (!url) return;
            const preview = document.getElementById('settingsPreview');
            preview.src = url;
            preview.style.display = 'block';
        }

        function resetBackground() {
            currentBgUrl = DEFAULT_BG_URL;
            document.getElementById('floralBgImage').src = DEFAULT_BG_URL;
            document.getElementById('settingsBgUrl').value = DEFAULT_BG_URL;
            document.getElementById('settingsStatus').textContent = 'تم استعادة الصورة الافتراضية';
            document.getElementById('settingsPreview').style.display = 'none';
            saveBgToFirebase(DEFAULT_BG_URL);
        }

        function saveAllSettings() {
            const bgUrl = document.getElementById('settingsBgUrl').value.trim() || currentBgUrl;
            const groom = document.getElementById('settingsGroom').value.trim() || 'mahmoud';
            const bride = document.getElementById('settingsBride').value.trim() || 'eman';
            const date = document.getElementById('settingsDate').value.trim() || '08.08.2026';
            
            // Update UI
            currentBgUrl = bgUrl;
            document.getElementById('floralBgImage').src = bgUrl;
            document.getElementById('letterGroom').textContent = groom;
            document.getElementById('letterBride').textContent = bride;
            document.getElementById('letterDate').textContent = date.replace(/(\d{2})\.(\d{2})\.(\d{4})/, '$1 . $2 . $3');
            
            // Save to Firebase
            db.ref('envelopeSettings').set({
                bgUrl: bgUrl,
                groomName: groom,
                brideName: bride,
                eventDate: date,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('settingsStatus').textContent = 'تم حفظ جميع الإعدادات بنجاح!';
            }).catch(() => {
                document.getElementById('settingsStatus').textContent = 'تم الحفظ محلياً (Firebase غير متاح)';
            });
            
            // Local backup
            localStorage.setItem('envelopeBgUrl', bgUrl);
            localStorage.setItem('envelopeGroom', groom);
            localStorage.setItem('envelopeBride', bride);
            localStorage.setItem('envelopeDate', date);
        }

        function saveBgToFirebase(url) {
            db.ref('envelopeSettings/bgUrl').set(url).catch(() => {});
        }

        // ============ CLOUDINARY UPLOAD WIDGET ============
        function openCloudinaryWidget() {
            cloudinary.openUploadWidget({
                cloudName: CLOUDINARY_CLOUD_NAME,
                uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                apiKey: CLOUDINARY_API_KEY,
                folder: CLOUDINARY_FOLDER,
                cropping: true,
                croppingAspectRatio: 0.75,
                showSkipCropButton: false,
                maxFileSize: 10000000,
                sources: ['local', 'url', 'camera', 'image_search'],
                styles: {
                    palette: {
                        window: "#1a0a0f",
                        windowBorder: "#c9a87c",
                        tabIcon: "#e8a0b4",
                        menuIcons: "#c9a87c",
                        textDark: "#ffffff",
                        textLight: "#cccccc",
                        link: "#e8a0b4",
                        action: "#c9a87c",
                        inProgress: "#e8a0b4",
                        complete: "#43e97b",
                        error: "#f5576c"
                    }
                }
            }, (error, result) => {
                if (error) {
                    console.error('Upload error:', error);
                    document.getElementById('settingsStatus').textContent = 'خطأ في الرفع';
                    return;
                }
                
                if (result && result.event === 'success') {
                    const uploadedUrl = result.info.secure_url;
                    currentBgUrl = uploadedUrl;
                    
                    // Update UI immediately
                    document.getElementById('floralBgImage').style.opacity = '0.5';
                    document.getElementById('floralBgImage').src = uploadedUrl;
                    setTimeout(() => {
                        document.getElementById('floralBgImage').style.opacity = '1';
                    }, 300);
                    
                    document.getElementById('settingsBgUrl').value = uploadedUrl;
                    document.getElementById('settingsStatus').textContent = 'تم رفع الصورة بنجاح!';
                    
                    // Show preview
                    const preview = document.getElementById('settingsPreview');
                    preview.src = uploadedUrl;
                    preview.style.display = 'block';
                    
                    // Save
                    saveBgToFirebase(uploadedUrl);
                    localStorage.setItem('envelopeBgUrl', uploadedUrl);
                }
            });
        }

        // ============ DRAG & DROP ============
        function closeDragDrop() {
            document.getElementById('dragDropOverlay').classList.remove('active');
        }

        function initDragDrop() {
            const overlay = document.getElementById('dragDropOverlay');
            const zone = document.getElementById('dragDropZone');
            const progressContainer = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('uploadProgressFill');
            const progressPercent = document.getElementById('uploadProgressPercent');
            
            // Click on zone to trigger file input
            zone.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) uploadViaCloudinary(file);
                };
                input.click();
            });
            
            // Drag events on body
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
                overlay.classList.add('active');
                zone.classList.add('drag-over');
            });
            
            document.addEventListener('dragleave', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    zone.classList.remove('drag-over');
                }
            });
            
            overlay.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('drag-over');
            });
            
            overlay.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });
            
            overlay.addEventListener('drop', (e) => {
                e.preventDefault();
                overlay.classList.remove('active');
                zone.classList.remove('drag-over');
                
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    uploadViaCloudinary(file);
                }
            });
        }

        async function uploadViaCloudinary(file) {
            const progressContainer = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('uploadProgressFill');
            const progressPercent = document.getElementById('uploadProgressPercent');
            const progressText = document.getElementById('uploadProgressText');
            
            progressContainer.classList.add('active');
            progressText.textContent = 'جاري رفع الصورة...';
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', CLOUDINARY_FOLDER);
            formData.append('api_key', CLOUDINARY_API_KEY);
            
            try {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        progressFill.style.width = `${percent}%`;
                        progressPercent.textContent = `${percent}%`;
                    }
                });
                
                const result = await new Promise((resolve, reject) => {
                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            resolve(JSON.parse(xhr.responseText));
                        } else {
                            reject(new Error('Upload failed'));
                        }
                    };
                    xhr.onerror = () => reject(new Error('Network error'));
                    xhr.send(formData);
                });
                
                const uploadedUrl = result.secure_url;
                currentBgUrl = uploadedUrl;
                
                document.getElementById('floralBgImage').style.opacity = '0.5';
                document.getElementById('floralBgImage').src = uploadedUrl;
                setTimeout(() => {
                    document.getElementById('floralBgImage').style.opacity = '1';
                }, 300);
                
                document.getElementById('settingsBgUrl').value = uploadedUrl;
                document.getElementById('settingsStatus').textContent = 'تم رفع الصورة بنجاح!';
                
                saveBgToFirebase(uploadedUrl);
                localStorage.setItem('envelopeBgUrl', uploadedUrl);
                
                progressText.textContent = 'تم رفع الصورة بنجاح!';
                setTimeout(() => {
                    progressContainer.classList.remove('active');
                }, 1500);
                
            } catch (error) {
                console.error('Upload error:', error);
                progressText.textContent = 'خطأ في الرفع: ' + error.message;
                setTimeout(() => {
                    progressContainer.classList.remove('active');
                }, 3000);
            }
        }

        // ============ LOAD SETTINGS ============
        function loadSettings() {
            // Try Firebase first
            db.ref('envelopeSettings').once('value').then(snap => {
                const data = snap.val();
                if (data) {
                    if (data.bgUrl && data.bgUrl !== currentBgUrl) {
                        currentBgUrl = data.bgUrl;
                        document.getElementById('floralBgImage').src = data.bgUrl;
                    }
                    if (data.groomName) document.getElementById('letterGroom').textContent = data.groomName;
                    if (data.brideName) document.getElementById('letterBride').textContent = data.brideName;
                    if (data.eventDate) {
                        const formatted = data.eventDate.replace(/(\d{2})\.(\d{2})\.(\d{4})/, '$1 . $2 . $3');
                        document.getElementById('letterDate').textContent = formatted;
                    }
                }
            }).catch(() => {
                // Fallback to localStorage
                const localBg = localStorage.getItem('envelopeBgUrl');
                if (localBg) {
                    currentBgUrl = localBg;
                    document.getElementById('floralBgImage').src = localBg;
                }
                const localGroom = localStorage.getItem('envelopeGroom');
                if (localGroom) document.getElementById('letterGroom').textContent = localGroom;
                const localBride = localStorage.getItem('envelopeBride');
                if (localBride) document.getElementById('letterBride').textContent = localBride;
                const localDate = localStorage.getItem('envelopeDate');
                if (localDate) {
                    const formatted = localDate.replace(/(\d{2})\.(\d{2})\.(\d{4})/, '$1 . $2 . $3');
                    document.getElementById('letterDate').textContent = formatted;
                }
            });
        }

        // ============ AMBIENT SPARKLES ============
        function initAmbientSparkles() {
            setInterval(() => {
                if (!flapOpen && !isAnimating) {
                    const stage = document.getElementById('envelopeStage');
                    const rect = stage.getBoundingClientRect();
                    createSparkle(rect.left+Math.random()*rect.width, rect.top+Math.random()*rect.height, 1);
                }
            }, 2500);
        }

        // ============ INIT ============
        function init() {
            initAIGlowFollower();
            initAIParticles();
            initGoldenParticles();
            initEnvelopeInteraction();
            initSealSettings();
            initDragDrop();
            initAmbientSparkles();
            loadSettings();
            
            setTimeout(() => {
                document.getElementById('lightRaysContainer').classList.add('visible');
            }, 1500);
            
            console.log('%c✨ Royal Envelope with Cloudinary Active ✨', 'font-size:18px;color:#c9a87c;');
            console.log('%c📸 Background: ' + currentBgUrl, 'color:#e8a0b4;');
            console.log('%c⚙️ 5 clicks on seal for settings', 'color:#e8d9c5;');
        }

        init();
    </script>
