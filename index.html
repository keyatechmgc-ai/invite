<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahmoud & Eman | افتح الظرف</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Great+Vibes&family=Dancing+Script:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800;900&family=El+Messiri:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Raleway:wght@300;400;500;600;700;800&family=Changa:wght@400;500;600;700;800&family=Almarai:wght@400;700;800&family=Reem+Kufi:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #e8a0b4;
            --pink-light: #f2c8d4;
            --pink-dark: #c47d8b;
            --pink-soft: #f9e4ea;
            --pink-pale: #fdf5f7;
            --pink-medium: #e8b4c4;
            --white: #ffffff;
            --dark: #3d2c30;
            --dark-soft: #5c4549;
            --gold: #c9a87c;
            --gold-light: #e8d9c5;
            --gold-dark: #b8946a;
            --gold-bright: #d4b896;
            --gold-shimmer: #f0e5d8;
            --cream: #fdf8f5;
            --shadow-envelope: 0 40px 100px rgba(60, 44, 48, 0.2), 0 15px 40px rgba(196,125,139,0.15);
            --shadow-flap: 0 15px 50px rgba(60, 44, 48, 0.25);
            --shadow-seal: 0 10px 35px rgba(196,125,139,0.5), inset 0 3px 0 rgba(255,255,255,0.3);
            --gradient-envelope: linear-gradient(165deg, #fdf5f7 0%, #f9e4ea 25%, #f2c8d4 50%, #f5d5de 75%, #fdf5f7 100%);
            --gradient-flap: linear-gradient(170deg, #f9e4ea 0%, #f2c8d4 20%, #e8b4c4 50%, #e8a0b4 80%, #f2c8d4 100%);
            --gradient-seal: linear-gradient(135deg, #c9a87c 0%, #e8d9c5 30%, #c9a87c 60%, #b8946a 100%);
            --gradient-gold-trim: linear-gradient(180deg, #e8d9c5 0%, #c9a87c 50%, #b8946a 100%);
            --names-font: 'Cormorant Garamond', serif;
            --main-font: 'Cairo', sans-serif;
            --script-font: 'Great Vibes', cursive;
            --ai-transition: cubic-bezier(0.25, 0.1, 0.25, 1);
            --ai-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--main-font);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3d2c30;
        }

        /* ============ FLORAL BACKGROUND ============ */
        .floral-bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .floral-bg-image {
            position: absolute;
            inset: -5%;
            width: 110%;
            height: 110%;
            object-fit: cover;
            z-index: 0;
            animation: bgSlowZoom 25s ease-in-out infinite alternate;
        }

        @keyframes bgSlowZoom {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.06) rotate(1deg); }
        }

        .floral-bg-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: 
                radial-gradient(ellipse at 30% 50%, rgba(255,245,247,0.2) 0%, rgba(255,245,247,0.5) 30%, rgba(196,125,139,0.4) 60%, rgba(60,44,48,0.75) 100%);
        }

        .floral-bg-vignette {
            position: absolute;
            inset: 0;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(60,44,48,0.8) 100%);
            pointer-events: none;
        }

        /* ============ AI GLOW FOLLOWER ============ */
        .ai-glow-follower {
            position: fixed;
            pointer-events: none;
            z-index: 4;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,160,180,0.12) 0%, rgba(232,160,180,0.04) 35%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .ai-glow-follower.active {
            opacity: 1;
        }

        /* ============ AI PARTICLES CANVAS ============ */
        #aiParticlesCanvas {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0.75;
        }

        /* ============ AI SPARKLES ============ */
        .ai-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 6;
            animation: sparkleAnimation var(--sparkle-duration) ease-out forwards;
        }

        @keyframes sparkleAnimation {
            0% {
                transform: translate(0, 0) scale(0) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 1;
                transform: translate(0, 0) scale(1.3) rotate(45deg);
            }
            100% {
                transform: translate(var(--sparkle-tx), var(--sparkle-ty)) scale(0) rotate(var(--sparkle-rot));
                opacity: 0;
            }
        }

        /* ============ GOLDEN FLOATING PARTICLES ============ */
        .golden-particle {
            position: fixed;
            pointer-events: none;
            z-index: 7;
            animation: goldenFloat var(--particle-duration) ease-in-out infinite;
            animation-delay: var(--particle-delay);
        }

        @keyframes goldenFloat {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
                opacity: 0.2;
            }
            20% {
                transform: translateY(-30px) translateX(20px) rotate(72deg) scale(1.3);
                opacity: 0.7;
            }
            40% {
                transform: translateY(-70px) translateX(-15px) rotate(144deg) scale(1);
                opacity: 0.5;
            }
            60% {
                transform: translateY(-50px) translateX(-30px) rotate(216deg) scale(1.2);
                opacity: 0.6;
            }
            80% {
                transform: translateY(-20px) translateX(10px) rotate(288deg) scale(1.1);
                opacity: 0.4;
            }
        }

        /* ============ LIGHT RAYS ============ */
        .light-rays-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .light-rays-container.visible {
            opacity: 0.6;
        }

        .light-ray {
            position: absolute;
            top: -50%;
            left: 50%;
            width: 2px;
            height: 150%;
            background: linear-gradient(180deg, rgba(232,217,197,0.4) 0%, rgba(232,217,197,0.1) 50%, transparent 100%);
            transform-origin: bottom center;
            animation: lightRayRotate var(--ray-duration) linear infinite;
            animation-delay: var(--ray-delay);
        }

        @keyframes lightRayRotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        /* ============ MAIN ENVELOPE CONTAINER ============ */
        .envelope-stage {
            position: relative;
            z-index: 10;
            perspective: 1500px;
            perspective-origin: 50% 50%;
            animation: stageFloat 7s ease-in-out infinite;
        }

        @keyframes stageFloat {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            20% { transform: translateY(-8px) rotateX(2deg); }
            40% { transform: translateY(3px) rotateX(-1deg); }
            60% { transform: translateY(-5px) rotateX(1deg); }
            80% { transform: translateY(6px) rotateX(-2deg); }
        }

        /* ============ ENVELOPE SHADOW ============ */
        .envelope-floor-shadow {
            position: absolute;
            bottom: -55px;
            left: 50%;
            transform: translateX(-50%);
            width: 115%;
            height: 65px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.2) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: shadowDynamic 4s ease-in-out infinite;
        }

        @keyframes shadowDynamic {
            0%, 100% { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 0.75; }
            50% { transform: translateX(-50%) scaleX(1.12) scaleY(0.85); opacity: 0.95; }
        }

        /* ============ FLORAL DECORATIONS AROUND ENVELOPE ============ */
        .floral-decor {
            position: absolute;
            pointer-events: none;
            z-index: 11;
        }

        .floral-decor-top {
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            animation: floralSwayTop 6s ease-in-out infinite;
        }

        @keyframes floralSwayTop {
            0%, 100% { transform: translateX(-50%) rotate(0deg) scale(1); }
            30% { transform: translateX(calc(-50% + 10px)) rotate(4deg) scale(1.05); }
            70% { transform: translateX(calc(-50% - 10px)) rotate(-4deg) scale(0.97); }
        }

        .floral-decor-left {
            top: 28%;
            left: -70px;
            animation: floralSwayLeft 7s ease-in-out infinite;
        }

        @keyframes floralSwayLeft {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-15px) rotate(6deg); }
            80% { transform: translateY(8px) rotate(-3deg); }
        }

        .floral-decor-right {
            top: 28%;
            right: -70px;
            animation: floralSwayRight 7s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        @keyframes floralSwayRight {
            0%, 100% { transform: translateY(0) rotate(0deg) scaleX(-1); }
            40% { transform: translateY(-15px) rotate(-6deg) scaleX(-1); }
            80% { transform: translateY(8px) rotate(3deg) scaleX(-1); }
        }

        .floral-decor-bottom {
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            animation: floralSwayBottom 6.5s ease-in-out infinite;
            animation-delay: 0.8s;
        }

        @keyframes floralSwayBottom {
            0%, 100% { transform: translateX(-50%) rotate(0deg) scale(1); }
            33% { transform: translateX(calc(-50% + 8px)) rotate(3deg) scale(1.04); }
            66% { transform: translateX(calc(-50% - 8px)) rotate(-3deg) scale(0.96); }
        }

        /* ============ 3D ENVELOPE ============ */
        .envelope-3d-container {
            position: relative;
            width: 390px;
            width: min(86vw, 410px);
            height: 280px;
            height: min(44vh, 300px);
            transform-style: preserve-3d;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.6s var(--ai-transition);
        }

        .envelope-3d-container:hover {
            transform: scale(1.02);
        }

        .envelope-3d-container.user-interacting {
            transform: scale(1.03);
        }

        /* Envelope Back Panel */
        .envelope-back-panel {
            position: absolute;
            inset: 0;
            background: var(--gradient-envelope);
            border-radius: 22px;
            transform: translateZ(-18px);
            box-shadow: var(--shadow-envelope);
            z-index: 0;
            border: 2.5px solid rgba(196,125,139,0.1);
            overflow: hidden;
        }

        .envelope-back-panel::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 2px solid rgba(196,125,139,0.06);
            border-radius: 16px;
            pointer-events: none;
        }

        /* Back panel decorative pattern */
        .envelope-back-pattern {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(45deg, var(--pink-dark) 0, var(--pink-dark) 1px, transparent 0, transparent 15px),
                repeating-linear-gradient(-45deg, var(--pink-dark) 0, var(--pink-dark) 1px, transparent 0, transparent 15px);
            pointer-events: none;
            z-index: 0;
        }

        /* Envelope Body (Bottom Part) */
        .envelope-body-lower {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.92) 0%, 
                rgba(253,245,247,0.88) 20%, 
                rgba(249,228,234,0.82) 50%, 
                rgba(242,200,212,0.78) 100%);
            border-radius: 0 0 22px 22px;
            transform: translateZ(2px);
            box-shadow: 0 12px 40px rgba(60,44,48,0.13);
            z-index: 2;
            border: 2px solid rgba(196,125,139,0.08);
            border-top: none;
            overflow: hidden;
            backdrop-filter: blur(3px);
        }

        /* Envelope V-cut */
        .envelope-vcut {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 42px solid transparent;
            border-right: 42px solid transparent;
            border-top: 34px solid rgba(249,228,234,0.88);
            z-index: 3;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.07));
        }

        /* Gold Trim on V-cut */
        .envelope-vcut-gold {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 44px solid transparent;
            border-right: 44px solid transparent;
            border-top: 36px solid rgba(201,168,124,0.35);
            z-index: 2;
            pointer-events: none;
        }

        /* Envelope body decorative pattern */
        .envelope-body-pattern {
            position: absolute;
            inset: 18px;
            border: 2px dashed rgba(196,125,139,0.12);
            border-radius: 14px;
            pointer-events: none;
            z-index: 1;
        }

        .envelope-body-pattern::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1.5px dotted rgba(201,168,124,0.1);
            border-radius: 10px;
        }

        /* Gold corner ornaments on body */
        .gold-corner-ornament {
            position: absolute;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 4;
            opacity: 0.5;
        }

        .gold-corner-ornament.top-left {
            top: 20px;
            left: 20px;
        }

        .gold-corner-ornament.top-right {
            top: 20px;
            right: 20px;
            transform: scaleX(-1);
        }

        .gold-corner-ornament.bottom-left {
            bottom: 20px;
            left: 20px;
            transform: scaleY(-1);
        }

        .gold-corner-ornament.bottom-right {
            bottom: 20px;
            right: 20px;
            transform: scale(-1, -1);
        }

        /* Envelope Flap */
        .envelope-flap-royal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 59%;
            background: var(--gradient-flap);
            border-radius: 22px 22px 58% 58%;
            transform-origin: top center;
            transform: translateZ(10px);
            transition: transform 0.9s var(--ai-bounce);
            box-shadow: var(--shadow-flap);
            z-index: 6;
            cursor: grab;
            touch-action: none;
            overflow: hidden;
        }

        .envelope-flap-royal:active {
            cursor: grabbing;
        }

        .envelope-flap-royal.opened {
            transform: rotateX(-178deg) translateZ(10px);
            border-radius: 22px 22px 0 0;
            box-shadow: 0 30px 70px rgba(60,44,48,0.35);
        }

        /* Flap inner texture */
        .envelope-flap-royal::before {
            content: '';
            position: absolute;
            inset: 14px;
            border: 2px solid rgba(255,255,255,0.38);
            border-radius: 16px 16px 48% 48%;
            pointer-events: none;
        }

        .envelope-flap-royal::after {
            content: '';
            position: absolute;
            inset: 26px;
            border: 1.5px solid rgba(255,255,255,0.22);
            border-radius: 12px 12px 40% 40%;
            pointer-events: none;
        }

        /* Flap floral embroidery */
        .flap-floral-embroidery {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
            animation: embroideryShimmer 3s ease-in-out infinite;
        }

        @keyframes embroideryShimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.55; }
        }

        /* Gold trim on flap edge */
        .flap-gold-trim {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-gold-trim);
            z-index: 7;
            pointer-events: none;
            opacity: 0.8;
            box-shadow: 0 2px 8px rgba(201,168,124,0.4);
        }

        /* ============ LETTER INSIDE ============ */
        .letter-inside-envelope {
            position: absolute;
            left: 20px;
            right: 20px;
            top: 35%;
            height: 48%;
            background: linear-gradient(180deg, #ffffff 0%, #fefcfb 40%, #fdf8f7 100%);
            border-radius: 14px;
            z-index: 1;
            transition: transform 0.9s var(--ai-bounce);
            box-shadow: 0 10px 35px rgba(60,44,48,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateZ(0);
            border: 1.5px solid rgba(196,125,139,0.06);
            overflow: hidden;
        }

        .letter-inside-envelope.revealed {
            transform: translateY(-40%) translateZ(0);
            box-shadow: 0 22px 60px rgba(60,44,48,0.25);
        }

        .letter-inside-envelope::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(196,125,139,0.02) 4px, rgba(196,125,139,0.02) 5px);
            pointer-events: none;
        }

        .letter-inside-envelope::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(201,168,124,0.28);
            border-radius: 10px;
            pointer-events: none;
        }

        .letter-content-wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 22px;
        }

        .letter-names-display {
            font-family: var(--names-font);
            font-size: 2.3rem;
            font-weight: 500;
            color: var(--pink-dark);
            letter-spacing: 5px;
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .letter-and-display {
            display: block;
            font-family: var(--script-font);
            font-size: 1.7rem;
            color: var(--gold-dark);
            margin: 5px 0 10px;
            line-height: 1;
        }

        .letter-date-display {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.65rem;
            color: #ccc;
            letter-spacing: 7px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .letter-tap-hint {
            display: inline-block;
            font-family: var(--main-font);
            font-size: 0.58rem;
            color: #ccc;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
            animation: tapHintPulse 2.5s ease-in-out infinite;
        }

        @keyframes tapHintPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.85; }
        }

        /* ============ ROYAL WAX SEAL - ROTATING ============ */
        .royal-wax-seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(18px);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-seal);
            z-index: 8;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-seal);
            transition: all 0.7s var(--ai-bounce);
            pointer-events: none;
            animation: sealContinuousRotate 8s linear infinite;
        }

        @keyframes sealContinuousRotate {
            from { transform: translate(-50%, -50%) translateZ(18px) rotate(0deg); }
            to { transform: translate(-50%, -50%) translateZ(18px) rotate(360deg); }
        }

        .royal-wax-seal.paused {
            animation-play-state: paused;
        }

        .royal-wax-seal.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) translateZ(18px) scale(0) rotate(225deg);
            animation: none;
        }

        .seal-outer-ring {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: sealRingPulse 2s ease-in-out infinite;
        }

        @keyframes sealRingPulse {
            0%, 100% { border-color: rgba(255,255,255,0.55); }
            50% { border-color: rgba(255,255,255,0.8); }
        }

        .seal-inner-ring {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seal-monogram {
            font-family: var(--names-font);
            font-size: 1.4rem;
            color: white;
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.18);
        }

        /* ============ ENVELOPE FLORAL OVERLAY ============ */
        .envelope-floral-overlay {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        .envelope-floral-top-right {
            top: -15px;
            right: -15px;
            animation: envelopeFloralFloat 5s ease-in-out infinite;
        }

        .envelope-floral-bottom-left {
            bottom: -15px;
            left: -15px;
            animation: envelopeFloralFloat 5s ease-in-out infinite;
            animation-delay: 2.5s;
        }

        @keyframes envelopeFloralFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(5px, -8px) rotate(5deg); }
        }

        /* ============ HINT TEXT ============ */
        .envelope-instruction {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.9);
            font-size: 0.78rem;
            letter-spacing: 6px;
            font-weight: 500;
            animation: instructionFloat 3s ease-in-out infinite;
            white-space: nowrap;
            z-index: 20;
            text-align: center;
            text-shadow: 0 2px 12px rgba(0,0,0,0.35);
        }

        @keyframes instructionFloat {
            0%, 100% { opacity: 0.45; transform: translateX(-50%) translateY(0); }

    <script>
        // ============ GLOBAL STATE ============
        let flapOpen = false;
        let isAnimating = false;
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let userInteracting = false;
        let lastInteraction = Date.now();
        let interactionIntensity = 0;

        // ============ AI GLOW FOLLOWER ============
        function initAIGlowFollower() {
            const glow = document.getElementById('aiGlowFollower');
            
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                glow.style.left = `${mouseX}px`;
                glow.style.top = `${mouseY}px`;
                glow.classList.add('active');
                updateUserActivity();
            });
            
            document.addEventListener('touchmove', (e) => {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                glow.style.left = `${mouseX}px`;
                glow.style.top = `${mouseY}px`;
                glow.classList.add('active');
                updateUserActivity();
            }, { passive: true });
            
            document.addEventListener('mouseleave', () => {
                glow.classList.remove('active');
                userInteracting = false;
            });
            
            document.addEventListener('touchend', () => {
                glow.classList.remove('active');
                userInteracting = false;
            });
        }

        function updateUserActivity() {
            userInteracting = true;
            lastInteraction = Date.now();
            interactionIntensity = Math.min(1, interactionIntensity + 0.2);
            
            // Reset after inactivity
            clearTimeout(window.activityTimeout);
            window.activityTimeout = setTimeout(() => {
                userInteracting = false;
                interactionIntensity = 0;
            }, 2000);
        }

        // ============ AI PARTICLES SYSTEM ============
        function initAIParticles() {
            const canvas = document.getElementById('aiParticlesCanvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const particles = [];
            const particleCount = 100;

            class AIParticle {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3.5 + 0.5;
                    this.baseSpeedX = (Math.random() - 0.5) * 0.35;
                    this.baseSpeedY = (Math.random() - 0.5) * 0.25;
                    this.speedX = this.baseSpeedX;
                    this.speedY = this.baseSpeedY;
                    this.opacity = Math.random() * 0.45 + 0.06;
                    this.color = Math.random() > 0.5 ? '232,160,180' : '201,168,124';
                    this.phase = Math.random() * Math.PI * 2;
                    this.oscSpeed = Math.random() * 0.012 + 0.004;
                    this.connectionRadius = 80;
                }
                update() {
                    this.phase += this.oscSpeed;
                    
                    // AI: React to user interaction
                    if (userInteracting) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const influenceRadius = 200;
                        
                        if (dist < influenceRadius) {
                            const force = (1 - dist / influenceRadius) * interactionIntensity * 2;
                            this.speedX += (dx / dist) * force * 0.3;
                            this.speedY += (dy / dist) * force * 0.3;
                        }
                    }
                    
                    // Apply speed with damping
                    this.speedX += (this.baseSpeedX - this.speedX) * 0.02;
                    this.speedY += (this.baseSpeedY - this.speedY) * 0.02;
                    
                    this.x += this.speedX + Math.sin(this.phase) * 0.25;
                    this.y += this.speedY + Math.cos(this.phase) * 0.2;
                    
                    if (this.x < -50) this.x = canvas.width + 50;
                    if (this.x > canvas.width + 50) this.x = -50;
                    if (this.y < -50) this.y = canvas.height + 50;
                    if (this.y > canvas.height + 50) this.y = -50;
                }
                draw(ctx) {
                    ctx.save();
                    const alpha = this.opacity + Math.sin(this.phase) * 0.12;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = `rgba(${this.color},${alpha})`;
                    ctx.shadowBlur = 14;
                    ctx.shadowColor = `rgba(${this.color},0.7)`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            for (let i = 0; i < particleCount; i++) {
                particles.push(new AIParticle());
            }

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const connectionThreshold = userInteracting ? 100 : 70;

                        if (distance < connectionThreshold) {
                            const alpha = (1 - distance / connectionThreshold) * 0.08;
                            ctx.save();
                            ctx.globalAlpha = alpha;
                            ctx.strokeStyle = `rgba(${particles[i].color},${alpha})`;
                            ctx.lineWidth = 0.3;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                            ctx.restore();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });
                drawConnections();
                requestAnimationFrame(animate);
            }

            animate();
        }

        // ============ AI GOLDEN PARTICLES ============
        function initGoldenParticles() {
            const container = document.getElementById('goldenParticlesContainer');
            
            function createGoldenParticle(nearEnvelope = false) {
                const particle = document.createElement('div');
                particle.className = 'golden-particle';
                
                const size = Math.random() * 5 + 2;
                let x, y;
                
                if (nearEnvelope) {
                    const stage = document.getElementById('envelopeStage');
                    const rect = stage.getBoundingClientRect();
                    x = ((rect.left + Math.random() * rect.width) / window.innerWidth) * 100;
                    y = ((rect.top + Math.random() * rect.height) / window.innerHeight) * 100;
                } else {
                    x = Math.random() * 100;
                    y = Math.random() * 100;
                }
                
                const duration = Math.random() * 7 + 7;
                const delay = Math.random() * 5;
                
                particle.style.cssText = `
                    left: ${x}%;
                    top: ${y}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: radial-gradient(circle, rgba(232,217,197,0.95) 0%, rgba(201,168,124,0.6) 100%);
                    border-radius: 50%;
                    --particle-duration: ${duration}s;
                    --particle-delay: ${delay}s;
                    box-shadow: 0 0 ${size * 4}px rgba(232,217,197,0.8), 0 0 ${size * 8}px rgba(201,168,124,0.4);
                `;
                
                container.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, (duration + delay) * 1000 + 500);
            }
            
            // Initial burst
            for (let i = 0; i < 20; i++) {
                setTimeout(() => createGoldenParticle(true), i * 150);
            }
            
            // Continuous creation
            setInterval(() => {
                const nearEnvelope = Math.random() > 0.5;
                createGoldenParticle(nearEnvelope);
            }, 1200);
        }

        // ============ AI SPARKLES ============
        function createSparkle(x, y, count = 1) {
            for (let i = 0; i < count; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'ai-sparkle';
                
                const size = Math.random() * 7 + 3;
                const tx = (Math.random() - 0.5) * 100;
                const ty = (Math.random() - 0.5) * 100 - 20;
                const rot = (Math.random() - 0.5) * 220;
                const duration = Math.random() * 1.8 + 1.2;
                
                sparkle.style.cssText = `
                    left: ${x + (Math.random() - 0.5) * 30}px;
                    top: ${y + (Math.random() - 0.5) * 30}px;
                    width: ${size}px;
                    height: ${size}px;
                    background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(232,217,197,0.8) 50%, rgba(232,160,180,0) 100%);
                    border-radius: 50%;
                    --sparkle-duration: ${duration}s;
                    --sparkle-tx: ${tx}px;
                    --sparkle-ty: ${ty}px;
                    --sparkle-rot: ${rot}deg;
                    box-shadow: 0 0 ${size * 3}px rgba(255,255,255,0.9), 0 0 ${size * 6}px rgba(232,217,197,0.6);
                    pointer-events: none;
                `;
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, duration * 1000 + 300);
            }
        }

        // ============ LIGHT RAYS CONTROL ============
        function initLightRays() {
            const raysContainer = document.getElementById('lightRaysContainer');
            
            // Show rays when user is active
            setInterval(() => {
                if (userInteracting) {
                    raysContainer.classList.add('visible');
                } else {
                    raysContainer.classList.remove('visible');
                }
            }, 1000);
            
            // Initially show
            setTimeout(() => {
                raysContainer.classList.add('visible');
            }, 2000);
        }

        // ============ ENVELOPE INTERACTION ============
        function initEnvelopeInteraction() {
            const flap = document.getElementById('envelopeFlapRoyal');
            const letter = document.getElementById('letterInside');
            const seal = document.getElementById('royalWaxSeal');
            const instruction = document.getElementById('envelopeInstruction');
            const container = document.getElementById('envelope3DContainer');
            const stage = document.getElementById('envelopeStage');
            
            let startY = 0;
            let currentRotation = 0;
            const maxOpen = -178;
            let sparkleInterval;
            
            function openFlap() {
                if (isAnimating || flapOpen) return;
                isAnimating = true;
                flapOpen = true;
                flap.classList.add('opened');
                letter.classList.add('revealed');
                seal.classList.add('hidden');
                seal.classList.add('paused');
                instruction.textContent = 'اضغط على الرسالة للمتابعة';
                
                // Sparkle burst on open
                const rect = container.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                for (let i = 0; i < 18; i++) {
                    setTimeout(() => {
                        createSparkle(centerX + (Math.random() - 0.5) * 250, centerY + (Math.random() - 0.5) * 200, 2);
                    }, i * 40);
                }
                
                // Extra golden particles
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const p = document.createElement('div');
                        p.className = 'golden-particle';
                        p.style.cssText = `
                            left: ${50 + (Math.random() - 0.5) * 30}%;
                            top: ${50 + (Math.random() - 0.5) * 30}%;
                            width: ${Math.random() * 8 + 4}px;
                            height: ${Math.random() * 8 + 4}px;
                            background: radial-gradient(circle, rgba(232,217,197,1) 0%, rgba(201,168,124,0.7) 100%);
                            border-radius: 50%;
                            --particle-duration: ${Math.random() * 3 + 2}s;
                            --particle-delay: 0s;
                            box-shadow: 0 0 15px rgba(232,217,197,0.9);
                        `;
                        document.getElementById('goldenParticlesContainer').appendChild(p);
                        setTimeout(() => p.remove(), 5000);
                    }, i * 60);
                }
                
                setTimeout(() => { isAnimating = false; }, 900);
            }
            
            function closeFlap() {
                if (isAnimating || !flapOpen) return;
                isAnimating = true;
                flapOpen = false;
                flap.classList.remove('opened');
                letter.classList.remove('revealed');
                seal.classList.remove('hidden');
                seal.classList.remove('paused');
                instruction.textContent = 'اسحب الطرف الذهبي للأعلى لفتح الظرف';
                
                setTimeout(() => { isAnimating = false; }, 900);
            }
            
            // Touch Events
            flap.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                flap.style.transition = 'none';
                container.classList.add('user-interacting');
                updateUserActivity();
                
                // Sparkles on touch
                const touch = e.touches[0];
                createSparkle(touch.clientX, touch.clientY, 2);
                
                // Continuous sparkles during interaction
                sparkleInterval = setInterval(() => {
                    if (userInteracting) {
                        createSparkle(touch.clientX + (Math.random() - 0.5) * 60, touch.clientY + (Math.random() - 0.5) * 60, 1);
                    }
                }, 100);
            }, { passive: true });
            
            flap.addEventListener('touchmove', (e) => {
                const diff = startY - e.touches[0].clientY;
                const rotation = Math.max(maxOpen, Math.min(0, -diff * 1.6));
                flap.style.transform = `rotateX(${rotation}deg) translateZ(10px)`;
                currentRotation = rotation;
                updateUserActivity();
                
                if (rotation < -80) {
                    letter.classList.add('revealed');
                    seal.classList.add('hidden');
                    seal.classList.add('paused');
                } else {
                    letter.classList.remove('revealed');
                    seal.classList.remove('hidden');
                    seal.classList.remove('paused');
                }
                
                // Sparkles during drag
                if (Math.random() > 0.6) {
                    createSparkle(e.touches[0].clientX, e.touches[0].clientY, 1);
                }
            }, { passive: true });
            
            flap.addEventListener('touchend', () => {
                flap.style.transition = 'transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1)';
                container.classList.remove('user-interacting');
                clearInterval(sparkleInterval);
                
                if (currentRotation < -60) {
                    openFlap();
                } else {
                    closeFlap();
                }
                currentRotation = 0;
            });
            
            // Mouse Events
            flap.addEventListener('mousedown', (e) => {
                startY = e.clientY;
                flap.style.transition = 'none';
                container.classList.add('user-interacting');
                updateUserActivity();
                
                createSparkle(e.clientX, e.clientY, 3);
                
                sparkleInterval = setInterval(() => {
                    if (userInteracting) {
                        createSparkle(e.clientX + (Math.random() - 0.5) * 60, e.clientY + (Math.random() - 0.5) * 60, 1);
                    }
                }, 80);
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
            
            function onMouseMove(e) {
                const diff = startY - e.clientY;
                const rotation = Math.max(maxOpen, Math.min(0, -diff * 1.6));
                flap.style.transform = `rotateX(${rotation}deg) translateZ(10px)`;
                currentRotation = rotation;
                updateUserActivity();
                
                if (rotation < -80) {
                    letter.classList.add('revealed');
                    seal.classList.add('hidden');
                    seal.classList.add('paused');
                } else {
                    letter.classList.remove('revealed');
                    seal.classList.remove('hidden');
                    seal.classList.remove('paused');
                }
                
                if (Math.random() > 0.5) {
                    createSparkle(e.clientX, e.clientY, 1);
                }
            }
            
            function onMouseUp() {
                flap.style.transition = 'transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1)';
                container.classList.remove('user-interacting');
                clearInterval(sparkleInterval);
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
                
                if (currentRotation < -60) {
                    openFlap();
                } else {
                    closeFlap();
                }
                currentRotation = 0;
            }
            
            // Click on letter to navigate
            letter.addEventListener('click', (e) => {
                if (flapOpen && letter.classList.contains('revealed')) {
                    // Massive sparkle explosion
                    for (let i = 0; i < 30; i++) {
                        setTimeout(() => {
                            createSparkle(
                                e.clientX + (Math.random() - 0.5) * 400,
                                e.clientY + (Math.random() - 0.5) * 400,
                                2
                            );
                        }, i * 25);
                    }
                    
                    // Golden particle burst
                    for (let i = 0; i < 15; i++) {
                        setTimeout(() => {
                            const p = document.createElement('div');
                            p.className = 'golden-particle';
                            p.style.cssText = `
                                left: ${50 + (Math.random() - 0.5) * 40}%;
                                top: ${50 + (Math.random() - 0.5) * 40}%;
                                width: ${Math.random() * 10 + 5}px;
                                height: ${Math.random() * 10 + 5}px;
                                background: radial-gradient(circle, rgba(232,217,197,1) 0%, rgba(201,168,124,0.8) 100%);
                                border-radius: 50%;
                                --particle-duration: ${Math.random() * 2 + 1.5}s;
                                --particle-delay: 0s;
                                box-shadow: 0 0 20px rgba(232,217,197,1);
                            `;
                            document.getElementById('goldenParticlesContainer').appendChild(p);
                            setTimeout(() => p.remove(), 3500);
                        }, i * 40);
                    }
                    
                    // Show light rays
                    document.getElementById('lightRaysContainer').classList.add('visible');
                    
                    // Navigate
                    setTimeout(() => {
                        document.body.style.transition = 'opacity 1.8s ease';
                        document.body.style.opacity = '0';
                        setTimeout(() => {
                            window.location.href = 'https://keyatechmgc-ai.github.io/invite/main.html';
                        }, 1800);
                    }, 600);
                }
            });
            
            // Hover effect on letter
            letter.addEventListener('mouseenter', () => {
                if (flapOpen) {
                    updateUserActivity();
                    createSparkle(
                        letter.getBoundingClientRect().left + letter.getBoundingClientRect().width / 2,
                        letter.getBoundingClientRect().top + letter.getBoundingClientRect().height / 2,
                        3
                    );
                }
            });
        }

        // ============ AMBIENT SPARKLES ============
        function initAmbientSparkles() {
            setInterval(() => {
                if (!flapOpen && !isAnimating) {
                    const stage = document.getElementById('envelopeStage');
                    const rect = stage.getBoundingClientRect();
                    const x = rect.left + Math.random() * rect.width;
                    const y = rect.top + Math.random() * rect.height;
                    createSparkle(x, y, 1);
                }
            }, 2500);
        }

        // ============ INITIALIZATION ============
        function init() {
            initAIGlowFollower();
            initAIParticles();
            initGoldenParticles();
            initLightRays();
            initEnvelopeInteraction();
            initAmbientSparkles();
            
            // Initial sparkle show
            setTimeout(() => {
                const stage = document.getElementById('envelopeStage');
                const rect = stage.getBoundingClientRect();
                for (let i = 0; i < 12; i++) {
                    setTimeout(() => {
                        createSparkle(
                            rect.left + Math.random() * rect.width,
                            rect.top + Math.random() * rect.height,
                            2
                        );
                    }, i * 120);
                }
            }, 800);
            
            console.log('%c✨ Royal Envelope System Active ✨', 'font-size:18px;color:#c9a87c;');
            console.log('%c👑 AI-Powered Interactive Experience', 'color:#e8a0b4;');
            console.log('%c💫 Seal Rotating | Particles Reacting | Sparkles Active', 'color:#e8d9c5;');
        }

        init();
    </script>
</body>
</html>
