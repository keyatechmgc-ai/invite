<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهيئة قاعدة البيانات - نظام إدارة الدعوات</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0e12 0%, #2a1a1f 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #e8c97a, #ffb7c5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: rgba(255,255,255,0.6);
        }
        
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(232,201,122,0.2);
        }
        
        .card h2 {
            color: #e8c97a;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-right: 3px solid #e8c97a;
            padding-right: 15px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .status-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .status-icon.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .status-icon.pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status-icon.error { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        .status-icon.info { background: rgba(33, 150, 243, 0.2); color: #2196f3; }
        
        .status-text {
            flex: 1;
        }
        
        .status-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .status-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }
        
        .status-value {
            font-family: monospace;
            font-size: 0.8rem;
            color: #e8c97a;
        }
        
        .btn {
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            color: #1a0e12;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(232,201,122,0.3);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .log-area {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #aaa;
        }
        
        .log-entry.success { color: #4caf50; }
        .log-entry.error { color: #f44336; }
        .log-entry.info { color: #2196f3; }
        
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e8c97a, #ffb7c5);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .flex-btns {
            display: flex;
            gap: 15px;
        }
        
        @media (max-width: 600px) {
            .card { padding: 20px; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ مدير تهيئة قاعدة البيانات ⚙️</h1>
            <p>تهيئة وحفظ جميع إعدادات شاشات الدعوات في Firebase</p>
        </div>
        
        <div class="card">
            <h2>📊 هيكل قاعدة البيانات</h2>
            <div id="dbStructure"></div>
        </div>
        
        <div class="card">
            <h2>🎛️ إجراءات التهيئة</h2>
            <div class="flex-btns">
                <button class="btn" onclick="initDatabase()">🚀 تهيئة قاعدة البيانات بالكامل</button>
                <button class="btn btn-secondary" onclick="resetDatabase()">🔄 إعادة ضبط كل شيء</button>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <button class="btn btn-secondary" onclick="exportDatabase()">📥 تصدير جميع البيانات (JSON)</button>
        </div>
        
        <div class="card">
            <h2>📝 سجل العمليات</h2>
            <div class="log-area" id="logArea">
                <div class="log-entry info">⏳ جاهز للتهيئة...</div>
            </div>
        </div>
    </div>

    <script>
        // ============ FIREBASE CONFIG ============
        const firebaseConfig = {
            apiKey: "AIzaSyCF-kh6JgAbhroue7cKRdMZjwYV8m2c6Uw",
            authDomain: "engagmen.firebaseapp.com",
            databaseURL: "https://engagmen-default-rtdb.firebaseio.com",
            projectId: "engagmen",
            storageBucket: "engagmen.firebasestorage.app",
            messagingSenderId: "286100738965",
            appId: "1:286100738965:web:3f5be0307dca5927e5dc9c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentProgress = 0;
        
        // ============ DEFAULT SETTINGS ============
        const DEFAULT_SETTINGS = {
            // إعدادات المين (الصفحة الرئيسية)
            mainSettings: {
                groom: "Mahmoud",
                bride: "Eman",
                eventLabel: "We're Getting Married!",
                eventDate: "08 . 08 . 2026",
                eventTime: "7:00 PM",
                venue: "Diva Hall",
                locationLink: "https://maps.google.com",
                globalBg: "https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg",
                coupleImage: "https://via.placeholder.com/160",
                musicUrl: "https://res.cloudinary.com/dsuv6suzb/video/upload/v1/wedding-audio/adkhly_omry_complete",
                countdownDate: "2026-08-08T19:00",
                updatedAt: null
            },
            
            // إعدادات الظرف (الصفحة الأولى)
            envelopeSettings: {
                groomName: "Mahmoud",
                brideName: "Eman",
                eventDate: "08.08.2026",
                bgUrl: "https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg",
                updatedAt: null
            },
            
            // التعليقات والتهاني
            wishes: {
                // سيتم إنشاء العقدة فقط، البيانات تأتي من المستخدمين
            },
            
            // إحصائيات النظام
            systemStats: {
                totalVisits: 0,
                totalWishes: 0,
                totalPresent: 0,
                totalMaybe: 0,
                totalExcused: 0,
                lastUpdated: null
            }
        };
        
        // ============ UTILITIES ============
        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            let icon = 'ℹ️';
            if (type === 'success') icon = '✅';
            if (type === 'error') icon = '❌';
            if (type === 'info') icon = '📌';
            logEntry.innerHTML = `[${time}] ${icon} ${message}`;
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
        }
        
        function updateProgress(increment) {
            currentProgress += increment;
            const fill = document.getElementById('progressFill');
            fill.style.width = Math.min(currentProgress, 100) + '%';
        }
        
        function resetProgress() {
            currentProgress = 0;
            document.getElementById('progressFill').style.width = '0%';
        }
        
        // ============ DISPLAY DATABASE STRUCTURE ============
        function displayDBStructure() {
            const structure = {
                'mainSettings': 'إعدادات الصفحة الرئيسية (الأسماء، التاريخ، الصور، الموسيقى)',
                'envelopeSettings': 'إعدادات صفحة الظرف (الأسماء، الخلفية)',
                'wishes': 'تهاني وردود أفعال المدعوين',
                'systemStats': 'إحصائيات النظام'
            };
            
            let html = '';
            for (const [key, value] of Object.entries(structure)) {
                html += `
                    <div class="status-item">
                        <div class="status-icon info">📁</div>
                        <div class="status-text">
                            <div class="status-title">/${key}</div>
                            <div class="status-desc">${value}</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('dbStructure').innerHTML = html;
        }
        
        // ============ CHECK CURRENT DATABASE STATUS ============
        async function checkDatabaseStatus() {
            addLog('🔍 جاري فحص حالة قاعدة البيانات...', 'info');
            
            const paths = ['mainSettings', 'envelopeSettings', 'wishes', 'systemStats'];
            
            for (const path of paths) {
                try {
                    const snapshot = await db.ref(path).once('value');
                    const exists = snapshot.exists();
                    const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
                    
                    if (exists) {
                        addLog(`📁 ${path}: موجود (${count} عنصر)`, 'success');
                    } else {
                        addLog(`📁 ${path}: غير موجود (سيتم إنشاؤه)`, 'info');
                    }
                } catch (error) {
                    addLog(`⚠️ خطأ في فحص ${path}: ${error.message}`, 'error');
                }
            }
        }
        
        // ============ INITIALIZE DATABASE ============
        async function initDatabase() {
            resetProgress();
            addLog('🚀 بدء تهيئة قاعدة البيانات...', 'info');
            addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
            
            try {
                // 1. تهيئة mainSettings
                updateProgress(10);
                addLog('📝 جاري حفظ إعدادات الصفحة الرئيسية (mainSettings)...', 'info');
                DEFAULT_SETTINGS.mainSettings.updatedAt = firebase.database.ServerValue.TIMESTAMP;
                await db.ref('mainSettings').set(DEFAULT_SETTINGS.mainSettings);
                addLog('✅ تم حفظ mainSettings بنجاح', 'success');
                
                // 2. تهيئة envelopeSettings
                updateProgress(20);
                addLog('📝 جاري حفظ إعدادات صفحة الظرف (envelopeSettings)...', 'info');
                DEFAULT_SETTINGS.envelopeSettings.updatedAt = firebase.database.ServerValue.TIMESTAMP;
                await db.ref('envelopeSettings').set(DEFAULT_SETTINGS.envelopeSettings);
                addLog('✅ تم حفظ envelopeSettings بنجاح', 'success');
                
                // 3. تهيئة systemStats
                updateProgress(30);
                addLog('📝 جاري حفظ إحصائيات النظام (systemStats)...', 'info');
                DEFAULT_SETTINGS.systemStats.lastUpdated = firebase.database.ServerValue.TIMESTAMP;
                await db.ref('systemStats').set(DEFAULT_SETTINGS.systemStats);
                addLog('✅ تم حفظ systemStats بنجاح', 'success');
                
                // 4. قراءة البيانات للتأكد
                updateProgress(50);
                addLog('🔍 جاري التحقق من البيانات المحفوظة...', 'info');
                
                const mainCheck = await db.ref('mainSettings').once('value');
                const mainData = mainCheck.val();
                addLog(`📊 mainSettings: العريس = ${mainData.groom}, العروسة = ${mainData.bride}`, 'success');
                
                const envelopeCheck = await db.ref('envelopeSettings').once('value');
                const envelopeData = envelopeCheck.val();
                addLog(`📊 envelopeSettings: العريس = ${envelopeData.groomName}, العروسة = ${envelopeData.brideName}`, 'success');
                
                updateProgress(80);
                addLog('💾 جميع البيانات محفوظة بشكل آمن في Firebase', 'success');
                
                // 5. عرض معلومات الاتصال
                updateProgress(100);
                addLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'success');
                addLog('🎉 تمت تهيئة قاعدة البيانات بنجاح!', 'success');
                addLog(`🔗 Database URL: ${firebaseConfig.databaseURL}`, 'info');
                addLog(`📅 آخر تحديث: ${new Date().toLocaleString()}`, 'info');
                
            } catch (error) {
                addLog(`❌ خطأ في تهيئة قاعدة البيانات: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        // ============ RESET DATABASE ============
        async function resetDatabase() {
            if (!confirm('⚠️ تحذير: هذا الإجراء سيحذف جميع البيانات الحالية ويستعيد الإعدادات الافتراضية!\n\nهل أنت متأكد؟')) {
                addLog('❌ تم إلغاء عملية إعادة الضبط', 'info');
                return;
            }
            
            resetProgress();
            addLog('🔄 بدء إعادة ضبط قاعدة البيانات...', 'info');
            addLog('⚠️ سيتم حذف جميع البيانات الموجودة', 'warning');
            
            try {
                // حذف جميع العقد
                updateProgress(10);
                addLog('🗑️ جاري حذف البيانات القديمة...', 'info');
                
                await db.ref('mainSettings').remove();
                updateProgress(30);
                await db.ref('envelopeSettings').remove();
                updateProgress(50);
                await db.ref('systemStats').remove();
                updateProgress(70);
                // ملاحظة: wishes لا يتم حذفها تلقائياً للحفاظ على تهاني المدعوين
                addLog('💬 تم الاحتفاظ بتهاني المدعوين (wishes)', 'info');
                
                // إعادة تهيئة البيانات الافتراضية
                updateProgress(80);
                addLog('📝 جاري إعادة تهيئة الإعدادات الافتراضية...', 'info');
                
                DEFAULT_SETTINGS.mainSettings.updatedAt = firebase.database.ServerValue.TIMESTAMP;
                await db.ref('mainSettings').set(DEFAULT_SETTINGS.mainSettings);
                
                DEFAULT_SETTINGS.envelopeSettings.updatedAt = firebase.database.ServerValue.TIMESTAMP;
                await db.ref('envelopeSettings').set(DEFAULT_SETTINGS.envelopeSettings);
                
                DEFAULT_SETTINGS.systemStats.lastUpdated = firebase.database.ServerValue.TIMESTAMP;
                await db.ref('systemStats').set(DEFAULT_SETTINGS.systemStats);
                
                updateProgress(100);
                addLog('✅ تم إعادة ضبط قاعدة البيانات بنجاح!', 'success');
                addLog('📋 جميع الإعدادات restored to defaults', 'success');
                
            } catch (error) {
                addLog(`❌ خطأ في إعادة الضبط: ${error.message}`, 'error');
            }
        }
        
        // ============ EXPORT DATABASE AS JSON ============
        async function exportDatabase() {
            addLog('📤 جاري تصدير قاعدة البيانات...', 'info');
            
            try {
                const exports = {};
                const paths = ['mainSettings', 'envelopeSettings', 'wishes', 'systemStats'];
                
                for (const path of paths) {
                    const snapshot = await db.ref(path).once('value');
                    exports[path] = snapshot.val() || {};
                    addLog(`📁 تم تصدير ${path}: ${Object.keys(exports[path]).length} عنصر`, 'success');
                }
                
                const dataStr = JSON.stringify(exports, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `firebase_export_${new Date().toISOString().slice(0,19)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                addLog('✅ تم تصدير قاعدة البيانات بنجاح!', 'success');
                addLog(`📦 حجم الملف: ${(dataBlob.size / 1024).toFixed(2)} KB`, 'info');
                
            } catch (error) {
                addLog(`❌ خطأ في التصدير: ${error.message}`, 'error');
            }
        }
        
        // ============ DISPLAY SUMMARY ============
        async function displaySummary() {
            try {
                const mainSnapshot = await db.ref('mainSettings').once('value');
                const envelopeSnapshot = await db.ref('envelopeSettings').once('value');
                const wishesSnapshot = await db.ref('wishes').once('value');
                const statsSnapshot = await db.ref('systemStats').once('value');
                
                const wishesCount = wishesSnapshot.exists() ? Object.keys(wishesSnapshot.val()).length : 0;
                
                const summaryHtml = `
                    <div class="status-item">
                        <div class="status-icon success">✅</div>
                        <div class="status-text">
                            <div class="status-title">الإعدادات الرئيسية</div>
                            <div class="status-desc">${mainSnapshot.exists() ? 'محفوظة' : 'غير محفوظة'}</div>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon success">✅</div>
                        <div class="status-text">
                            <div class="status-title">إعدادات الظرف</div>
                            <div class="status-desc">${envelopeSnapshot.exists() ? 'محفوظة' : 'غير محفوظة'}</div>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon info">💬</div>
                        <div class="status-text">
                            <div class="status-title">التهاني والبركات</div>
                            <div class="status-desc">${wishesCount} رسالة</div>
                        </div>
                    </div>
                    <div class="status-item">
                        <div class="status-icon info">📊</div>
                        <div class="status-text">
                            <div class="status-title">إحصائيات النظام</div>
                            <div class="status-desc">${statsSnapshot.exists() ? 'محفوظة' : 'غير محفوظة'}</div>
                        </div>
                    </div>
                `;
                
                document.getElementById('dbStructure').innerHTML = summaryHtml;
                
            } catch (error) {
                console.error('Error displaying summary:', error);
            }
        }
        
        // ============ AUTO-LOAD SUMMARY ON PAGE LOAD ============
        window.addEventListener('load', () => {
            displayDBStructure();
            checkDatabaseStatus();
            displaySummary();
            addLog('✨ مدير قاعدة البيانات جاهز', 'success');
            addLog('💡 استخدم الأزرار أعلاه لتهيئة أو إعادة ضبط قاعدة البيانات', 'info');
        });
        
        // ============ MONITOR REAL-TIME CHANGES ============
        db.ref('mainSettings').on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                console.log('🔄 mainSettings updated:', data);
            }
        });
        
        db.ref('envelopeSettings').on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                console.log('🔄 envelopeSettings updated:', data);
            }
        });
        
        db.ref('systemStats').on('value', (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                console.log('🔄 systemStats updated:', data);
            }
        });
    </script>
</body>
</html>
