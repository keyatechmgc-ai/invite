<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mahmoud & Eman | مملكة الحب</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- GSAP for advanced animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --pink: #ffb7c5;
            --pink-deep: #ff8da3;
            --pink-dark: #d46b81;
            --pink-royal: #c94f6b;
            --pink-glow: rgba(255,183,197,0.6);
            --gold: #e8c97a;
            --gold-dark: #c9a84c;
            --gold-glow: rgba(232,201,122,0.5);
            --white: #ffffff;
            --cream: #fff9f7;
            --dark: #2a1a1f;
            --shadow-royal: 0 30px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.1);
            --shadow-crystal: 0 25px 50px -12px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
            --gradient-royal: linear-gradient(135deg, #ffb7c5 0%, #ff8da3 25%, #e8c97a 50%, #ff8da3 75%, #ffb7c5 100%);
            --gradient-gold: linear-gradient(135deg, #e8c97a 0%, #c9a84c 50%, #e8c97a 100%);
            --gradient-bg: radial-gradient(ellipse at 30% 40%, rgba(255,183,197,0.15) 0%, rgba(201,79,107,0.05) 60%, rgba(42,26,31,0.02) 100%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #1a0e12;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* الخلفية الملكية المتحركة */
        .royal-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .royal-bg-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            animation: slowZoom 30s ease-in-out infinite alternate;
        }
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        .royal-bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(26,14,18,0.4) 0%, rgba(26,14,18,0.85) 100%);
        }
        .royal-bg-particles {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,183,197,0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: particleDrift 60s linear infinite;
        }
        @keyframes particleDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        /* كيرسر ملكي */
        .royal-cursor {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,183,197,0.08) 0%, rgba(255,141,163,0.04) 40%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .royal-cursor.active { opacity: 1; }
        .royal-cursor::after {
            content: '✨';
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: 20px;
            opacity: 0.6;
            animation: cursorSparkle 2s ease-in-out infinite;
        }
        @keyframes cursorSparkle {
            0%,100% { transform: scale(0.8) rotate(0deg); opacity: 0.4; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
        }

        /* قلوب ملكية 3D */
        .royal-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            filter: drop-shadow(0 0 10px rgba(255,183,197,0.8));
            animation: royalHeartFloat var(--dur) cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes royalHeartFloat {
            0% {
                transform: translateY(100vh) translateX(0) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% { opacity: 1; }
            50% {
                transform: translateY(40vh) translateX(var(--dx)) scale(var(--sc)) rotate(var(--rot));
                opacity: 1;
            }
            85% { opacity: 0.8; }
            100% {
                transform: translateY(-15vh) translateX(var(--dxe)) scale(0.2) rotate(calc(var(--rot) + 180deg));
                opacity: 0;
            }
        }

        /* سباركلز ملكية */
        .royal-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 9996;
            animation: royalSparkleAnim var(--dur) ease-out forwards;
        }
        @keyframes royalSparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            25% { transform: scale(1.8) rotate(90deg); opacity: 1; }
            75% { transform: scale(1) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(0) rotate(270deg); opacity: 0; }
        }

        /* جسيمات ثلاثية الأبعاد */
        #royalParticlesCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        /* الحاوية الرئيسية */
        .royal-container {
            position: relative;
            z-index: 10;
            max-width: 580px;
            margin: 0 auto;
            padding: 30px 20px 80px;
        }

        /* البطاقة الرئيسية - تصميم ملكي */
        .royal-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.96) 0%, rgba(255,249,247,0.92) 100%);
            backdrop-filter: blur(20px);
            border-radius: 80px 80px 80px 40px;
            padding: 50px 30px 60px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-royal), 0 0 0 2px rgba(255,255,255,0.3), 0 0 0 6px rgba(232,201,122,0.2);
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .royal-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,183,197,0.15) 0%, transparent 70%);
            animation: cardShine 12s linear infinite;
            pointer-events: none;
        }
        @keyframes cardShine {
            0% { transform: translate(-30%, -30%) rotate(0deg); }
            100% { transform: translate(30%, 30%) rotate(360deg); }
        }
        .royal-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 40px 70px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.4), 0 0 0 8px rgba(232,201,122,0.3);
        }

        /* إطار الصورة الملكي */
        .royal-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 6px;
            background: var(--gradient-royal);
            animation: frameRoyalPulse 3s ease-in-out infinite;
            position: relative;
        }
        .royal-frame::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(232,201,122,0.4), rgba(255,183,197,0.4));
            filter: blur(15px);
            z-index: -1;
            animation: frameGlow 2s ease-in-out infinite alternate;
        }
        @keyframes frameRoyalPulse {
            0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(232,201,122,0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 25px rgba(232,201,122,0); }
        }
        @keyframes frameGlow {
            0% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        .royal-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* الأسماء الملكية */
        .royal-names {
            text-align: center;
            margin-bottom: 20px;
        }
        .royal-groom, .royal-bride {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c94f6b, #e8c97a, #ffb7c5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 6px;
            text-shadow: 0 2px 10px rgba(201,79,107,0.2);
        }
        .royal-and {
            display: block;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--gold-dark);
            margin: 5px 0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* البادج الملكي */
        .royal-badge {
            display: inline-block;
            padding: 10px 32px;
            background: var(--gradient-gold);
            color: #2a1a1f;
            border-radius: 60px;
            font-size: 0.75rem;
            letter-spacing: 5px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 20px auto;
            box-shadow: 0 8px 20px rgba(232,201,122,0.3);
            position: relative;
            overflow: hidden;
        }
        .royal-badge::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(30deg);
            animation: badgeShine 3s infinite;
        }
        @keyframes badgeShine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }

        /* التفاصيل الملكية */
        .royal-details {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 25px;
        }
        .royal-detail {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--dark);
            font-size: 1rem;
            font-weight: 500;
            padding: 8px 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        .royal-detail:hover {
            background: rgba(255,255,255,0.9);
            transform: translateX(-5px);
        }
        .royal-detail-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ffb7c5, #ff8da3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(255,141,163,0.3);
        }

        /* رابط الدعوة الملكي */
        .royal-invite-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
            padding: 14px 35px;
            background: linear-gradient(135deg, #2a1a1f, #3d2a30);
            color: var(--gold);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(232,201,122,0.3);
        }
        .royal-invite-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border-color: var(--gold);
        }

        /* الكاونتر الملكي */
        .royal-countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 30px 0;
            perspective: 500px;
        }
        .royal-count-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,249,247,0.9));
            backdrop-filter: blur(10px);
            padding: 22px 12px;
            border-radius: 35px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(232,201,122,0.3);
            transform-style: preserve-3d;
        }
        .royal-count-item:hover {
            transform: translateY(-10px) rotateX(5deg);
            box-shadow: 0 25px 40px rgba(0,0,0,0.15);
            border-color: var(--gold);
        }
        .royal-count-item.animate {
            animation: countRoyalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes countRoyalPop {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.12) rotateX(10deg); background: white; }
        }
        .royal-count-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c94f6b, #e8c97a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: block;
            letter-spacing: 2px;
        }
        .royal-count-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--gold-dark);
            font-weight: 700;
            margin-top: 8px;
        }

        /* الفورم الملكي */
        .royal-form, .royal-comments {
            background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(255,249,247,0.92));
            backdrop-filter: blur(20px);
            border-radius: 55px;
            padding: 40px 28px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-royal);
            transition: all 0.5s ease;
        }
        .royal-form-title, .royal-comments-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #c94f6b, #e8c97a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* عناصر الإدخال الملكية */
        .royal-input, .royal-select, .royal-textarea {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid rgba(232,201,122,0.2);
            border-radius: 35px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            background: white;
            margin-bottom: 20px;
            transition: all 0.3s;
            outline: none;
        }
        .royal-input:focus, .royal-select:focus, .royal-textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 5px rgba(232,201,122,0.15);
        }

        .royal-side-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .royal-side-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid rgba(232,201,122,0.3);
            border-radius: 40px;
            background: white;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .royal-side-btn.active {
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            border-color: transparent;
            color: #2a1a1f;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(232,201,122,0.3);
        }

        .royal-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #c94f6b, #e8c97a);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .royal-submit::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(30deg);
            animation: submitShine 4s infinite;
        }
        @keyframes submitShine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
        .royal-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(201,79,107,0.3);
        }

        /* الفلاتر الملكية */
        .royal-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }
        .royal-filter {
            padding: 10px 24px;
            border: 2px solid rgba(232,201,122,0.3);
            border-radius: 40px;
            background: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .royal-filter.active {
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            color: #2a1a1f;
            border-color: transparent;
        }

        /* التعليقات الملكية */
        .royal-comments-list {
            max-height: 450px;
            overflow-y: auto;
        }
        .royal-comment {
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 35px;
            margin-bottom: 15px;
            border-right: 5px solid var(--gold);
            transition: all 0.3s;
            animation: commentRoyalAppear 0.5s ease;
        }
        @keyframes commentRoyalAppear {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .royal-comment:hover {
            transform: translateX(-5px);
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .royal-comment-badge {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            color: #2a1a1f;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .royal-comment-name {
            font-weight: 800;
            color: var(--pink-dark);
            margin-left: 12px;
        }
        .royal-comment-message {
            color: #555;
            font-size: 0.9rem;
            margin-top: 10px;
            line-height: 1.6;
        }

        /* لوحة التحكم الملكية */
        .royal-admin {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            z-index: 100000;
            display: none;
            overflow-y: auto;
            padding: 30px;
            align-items: center;
            justify-content: center;
        }
        .royal-admin.active {
            display: flex;
        }
        .royal-admin-card {
            background: linear-gradient(145deg, #1a0e12, #2a1a1f);
            border-radius: 60px;
            padding: 45px 35px;
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(232,201,122,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .royal-admin-card::-webkit-scrollbar {
            width: 5px;
        }
        .royal-admin-card::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .royal-admin-card::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        .royal-admin-title {
            color: var(--gold);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Cormorant Garamond', serif;
        }
        .royal-admin-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            display: block;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .royal-admin-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }
        .royal-admin-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 35px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .royal-admin-btn-primary {
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            color: #1a0e12;
        }
        .royal-admin-btn-danger {
            background: linear-gradient(135deg, #c94f6b, #a8324b);
            color: white;
        }

        /* المودال الملكي */
        .royal-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 1000000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .royal-modal.active {
            display: flex;
        }
        .royal-modal-content {
            background: linear-gradient(145deg, #fff, #fff9f7);
            border-radius: 70px;
            padding: 50px 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            animation: modalRoyalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalRoyalIn {
            from { transform: scale(0.7) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* فوتر */
        .royal-footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(232,201,122,0.5);
            font-size: 0.7rem;
            letter-spacing: 2px;

        </div>

    <script>
        // ============ FIREBASE ============
        const firebaseConfig = {
            apiKey: "AIzaSyCF-kh6JgAbhroue7cKRdMZjwYV8m2c6Uw",
            authDomain: "engagmen.firebaseapp.com",
            databaseURL: "https://engagmen-default-rtdb.firebaseio.com",
            projectId: "engagmen",
            storageBucket: "engagmen.firebasestorage.app",
            messagingSenderId: "286100738965",
            appId: "1:286100738965:web:3f5be0307dca5927e5dc9c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============ CLOUDINARY ============
        const CLOUD_NAME = 'dsuv6suzb';
        const UPLOAD_PRESET = 'wedding_upload';

        // ============ GLOBAL STATE ============
        let selectedSide = '';
        let allWishes = [];
        let currentFilter = 'all';
        let targetDate = new Date(2026, 7, 8, 19, 0, 0).getTime();
        let adminClicks = 0;

        // ============ DOM ELEMENTS ============
        const globalBg = document.getElementById('globalBgImage');
        const coupleImage = document.getElementById('coupleImage');

        // ============ AI PARTICLES (3D EFFECT) ============
        const canvas = document.getElementById('royalParticlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // إنشاء جسيمات ثلاثية الأبعاد
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 5 + 1,
                speedX: (Math.random() - 0.5) * 0.4,
                speedY: (Math.random() - 0.5) * 0.3,
                color: `rgba(${Math.random() > 0.5 ? '232,201,122' : '255,183,197'}, ${Math.random() * 0.3 + 0.1})`,
                phase: Math.random() * Math.PI * 2,
                speedPhase: Math.random() * 0.02 + 0.005
            });
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX + Math.sin(p.phase) * 0.08;
                p.y += p.speedY + Math.cos(p.phase) * 0.06;
                p.phase += p.speedPhase;
                
                if (p.x < -50) p.x = canvas.width + 50;
                if (p.x > canvas.width + 50) p.x = -50;
                if (p.y < -50) p.y = canvas.height + 50;
                if (p.y > canvas.height + 50) p.y = -50;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = `rgba(232,201,122,0.5)`;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============ AI HEARTS & SPARKLES ============
        function createRoyalHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'royal-heart';
            const size = Math.random() * 28 + 18;
            const hearts = ['❤️', '💖', '💗', '💕', '💘', '💝', '👑', '✨'];
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.cssText = `
                left: ${x}px;
                font-size: ${size}px;
                --dur: ${Math.random() * 5 + 4}s;
                --dx: ${(Math.random() - 0.5) * 180}px;
                --dxe: ${(Math.random() - 0.5) * 120}px;
                --rot: ${(Math.random() - 0.5) * 200}deg;
                --sc: ${Math.random() * 0.6 + 0.7};
            `;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 9000);
        }
        
        function createRoyalSparkle(x, y, count = 3) {
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'royal-sparkle';
                s.innerHTML = ['✨', '⭐', '🌟', '💫', '⚜️', '👑'][Math.floor(Math.random() * 6)];
                s.style.cssText = `
                    left: ${x + (Math.random() - 0.5) * 100}px;
                    top: ${y + (Math.random() - 0.5) * 100}px;
                    font-size: ${Math.random() * 20 + 12}px;
                    --dur: ${Math.random() * 1.2 + 0.8}s;
                `;
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 2000);
            }
        }

        // ============ AI CURSOR ============
        const cursor = document.getElementById('royalCursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.classList.add('active');
            if (Math.random() > 0.97) {
                createRoyalHeart(e.clientX, e.clientY);
                createRoyalSparkle(e.clientX, e.clientY, 2);
            }
        });
        document.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        
        // Ambient hearts
        setInterval(() => {
            if (Math.random() > 0.6) {
                const x = Math.random() * window.innerWidth;
                createRoyalHeart(x, window.innerHeight - 30);
            }
        }, 700);
        
        setInterval(() => {
            if (Math.random() > 0.8) {
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                createRoyalSparkle(x, y, 1);
            }
        }, 1200);

        // ============ GSAP SCROLL ANIMATIONS ============
        gsap.registerPlugin(ScrollTrigger);
        
        document.querySelectorAll('.scroll-hidden').forEach(el => {
            ScrollTrigger.create({
                trigger: el,
                start: 'top 85%',
                onEnter: () => {
                    el.classList.add('scroll-visible');
                    const rect = el.getBoundingClientRect();
                    createRoyalSparkle(rect.left + rect.width/2, rect.top + 10, 3);
                }
            });
        });
        
        // Hero card entrance animation
        gsap.fromTo('.royal-card', 
            { scale: 0.9, opacity: 0, y: 50 },
            { scale: 1, opacity: 1, y: 0, duration: 1, delay: 0.3, ease: 'back.out(1.2)' }
        );
        
        // Countdown items staggered animation
        gsap.fromTo('.royal-count-item', 
            { scale: 0, rotationY: -90, opacity: 0 },
            { scale: 1, rotationY: 0, opacity: 1, duration: 0.6, stagger: 0.1, delay: 0.5, ease: 'back.out(1.2)' }
        );

        // ============ COUNTDOWN ============
        function updateCountdown() {
            const diff = targetDate - Date.now();
            if (diff <= 0) {
                ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).textContent = '00');
                return;
            }
            document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
            document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
            document.getElementById('minutes').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
            document.getElementById('seconds').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
            
            // Random animation on countdown items
            if (Math.random() > 0.75) {
                const boxes = ['daysBox', 'hoursBox', 'minutesBox', 'secondsBox'];
                const box = document.getElementById(boxes[Math.floor(Math.random() * 4)]);
                box.classList.add('animate');
                setTimeout(() => box.classList.remove('animate'), 500);
                gsap.to(box, { scale: 1.1, duration: 0.2, yoyo: true, repeat: 1, ease: 'power2.out' });
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // ============ ADMIN PANEL (10 clicks on seconds) ============
        document.getElementById('secondsBox').addEventListener('click', () => {
            adminClicks++;
            setTimeout(() => { if (adminClicks < 10) adminClicks = 0; }, 3000);
            if (adminClicks >= 10) {
                document.getElementById('adminPanel').classList.add('active');
                loadSettingsToAdmin();
                adminClicks = 0;
                createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 10);
                canvasConfetti({ particleCount: 300, spread: 150, origin: { y: 0.5 }, colors: ['#e8c97a', '#ffb7c5'] });
            }
        });
        
        function loadSettingsToAdmin() {
            document.getElementById('adminGroom').value = document.getElementById('groomName').textContent;
            document.getElementById('adminBride').value = document.getElementById('brideName').textContent;
            document.getElementById('adminEventLabel').value = document.getElementById('eventLabel').textContent;
            document.getElementById('adminDate').value = document.getElementById('eventDate').textContent.replace(/\s/g, '');
            document.getElementById('adminTime').value = document.getElementById('eventTime').textContent;
            document.getElementById('adminVenue').value = document.getElementById('eventVenue').textContent;
            document.getElementById('adminLocationLink').value = document.getElementById('locationLink').href;
            document.getElementById('adminBgUrl').value = globalBg.src;
            document.getElementById('adminCoupleImg').value = coupleImage.src;
        }
        
        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('active');
        }
        
        // ============ UPLOAD FUNCTIONS ============
        function uploadGlobalBg() {
            cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local', 'url'] }, (err, res) => {
                if (res && res.event === 'success') {
                    globalBg.src = res.info.secure_url;
                    document.getElementById('adminBgUrl').value = res.info.secure_url;
                    db.ref('mainSettings/globalBg').set(res.info.secure_url);
                    createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 8);
                }
            });
        }
        
        function uploadCoupleImage() {
            cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local', 'url'] }, (err, res) => {
                if (res && res.event === 'success') {
                    coupleImage.src = res.info.secure_url;
                    document.getElementById('adminCoupleImg').value = res.info.secure_url;
                    db.ref('mainSettings/coupleImage').set(res.info.secure_url);
                    createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 8);
                }
            });
        }
        
        function resetGlobalBg() {
            const def = 'https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg';
            globalBg.src = def;
            document.getElementById('adminBgUrl').value = def;
            db.ref('mainSettings/globalBg').set(def);
        }
        
        function saveAllSettings() {
            const settings = {
                groom: document.getElementById('adminGroom').value,
                bride: document.getElementById('adminBride').value,
                eventLabel: document.getElementById('adminEventLabel').value,
                eventDate: document.getElementById('adminDate').value,
                eventTime: document.getElementById('adminTime').value,
                venue: document.getElementById('adminVenue').value,
                locationLink: document.getElementById('adminLocationLink').value,
                globalBg: globalBg.src,
                coupleImage: coupleImage.src
            };
            
            document.getElementById('groomName').textContent = settings.groom;
            document.getElementById('brideName').textContent = settings.bride;
            document.getElementById('eventLabel').textContent = settings.eventLabel;
            document.getElementById('eventDate').textContent = settings.eventDate;
            document.getElementById('eventTime').textContent = settings.eventTime;
            document.getElementById('eventVenue').textContent = settings.venue;
            document.getElementById('locationLink').href = settings.locationLink;
            
            db.ref('mainSettings').set(settings);
            showModal('✅ تم الحفظ', 'تم حفظ جميع الإعدادات الملكية بنجاح!', '👑');
            createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 15);
            canvasConfetti({ particleCount: 500, spread: 120, origin: { y: 0.6 }, colors: ['#e8c97a', '#ffb7c5', '#c94f6b'] });
        }
        
        // ============ LOAD SETTINGS FROM FIREBASE ============
        db.ref('mainSettings').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                if (data.groom) document.getElementById('groomName').textContent = data.groom;
                if (data.bride) document.getElementById('brideName').textContent = data.bride;
                if (data.eventLabel) document.getElementById('eventLabel').textContent = data.eventLabel;
                if (data.eventDate) document.getElementById('eventDate').textContent = data.eventDate;
                if (data.eventTime) document.getElementById('eventTime').textContent = data.eventTime;
                if (data.venue) document.getElementById('eventVenue').textContent = data.venue;
                if (data.locationLink) document.getElementById('locationLink').href = data.locationLink;
                if (data.globalBg) globalBg.src = data.globalBg;
                if (data.coupleImage) coupleImage.src = data.coupleImage;
            }
        });
        
        // Load from envelope settings
        db.ref('envelopeSettings').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                if (data.groomName) document.getElementById('groomName').textContent = data.groomName;
                if (data.brideName) document.getElementById('brideName').textContent = data.brideName;
            }
        });
        
        // ============ RSVP FUNCTIONS ============
        function selectSide(side, el) {
            selectedSide = side;
            document.querySelectorAll('.royal-side-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            createRoyalSparkle(el.getBoundingClientRect().left + el.offsetWidth/2, el.getBoundingClientRect().top + el.offsetHeight/2, 3);
        }
        
        function submitRSVP() {
            const name = document.getElementById('guestName').value.trim();
            const status = document.getElementById('guestStatus').value;
            const message = document.getElementById('guestMessage').value.trim();
            
            if (!name || !selectedSide) {
                showModal('تنبيه', 'يرجى إدخال الاسم واختيار طرف العريس أو العروسة', '⚠️');
                return;
            }
            
            db.ref('wishes').push({
                name, side: selectedSide, status, message,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                showModal('🎉 تم الإرسال', `شكراً ${name} على تهنئتك الجميلة!`, '💝');
                document.getElementById('guestName').value = '';
                document.getElementById('guestMessage').value = '';
                document.querySelectorAll('.royal-side-btn').forEach(btn => btn.classList.remove('active'));
                selectedSide = '';
                
                createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 20);
                canvasConfetti({ particleCount: 400, spread: 130, origin: { y: 0.6 }, colors: ['#e8c97a', '#ffb7c5', '#c94f6b', '#ff8da3'] });
                
                // Extra confetti wave
                setTimeout(() => {
                    canvasConfetti({ particleCount: 200, spread: 80, origin: { y: 0.4, x: 0.3 }, colors: ['#e8c97a', '#ffb7c5'] });
                    canvasConfetti({ particleCount: 200, spread: 80, origin: { y: 0.4, x: 0.7 }, colors: ['#c94f6b', '#ff8da3'] });
                }, 200);
            }).catch(() => {
                showModal('خطأ', 'حدث خطأ ما، حاول مرة أخرى', '❌');
            });
        }
        
        // ============ WISHES ============
        db.ref('wishes').orderByChild('timestamp').on('value', (snap) => {
            allWishes = [];
            snap.forEach(child => {
                allWishes.unshift({ id: child.key, ...child.val() });
            });
            renderWishes();
        });
        
        function filterWishes(type, el) {
            currentFilter = type;
            document.querySelectorAll('.royal-filter').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
            renderWishes();
        }
        
        function renderWishes() {
            const list = document.getElementById('wishesList');
            let filtered = currentFilter === 'all' ? allWishes : allWishes.filter(w => w.side === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:50px;color:#999;">✨ لا توجد تهاني بعد ✨</div>';
                return;
            }
            
            list.innerHTML = filtered.map((w, i) => {
                const statusText = w.status === 'حاضر' ? 'حاضر' : w.status === 'ربما' ? 'سيحاول' : 'معتذر';
                return `
                    <div class="royal-comment" style="animation-delay: ${i * 0.05}s">
                        <span class="royal-comment-badge">${w.side === 'عريس' ? 'العريس' : 'العروسة'}</span>
                        <span class="royal-comment-name">${escapeHtml(w.name)}</span>
                        <span style="font-size:0.7rem;color:#c9a84c;margin-right:10px;">${statusText}</span>
                        ${w.message ? `<div class="royal-comment-message">"${escapeHtml(w.message)}"</div>` : '<div class="royal-comment-message">❤️</div>'}
                    </div>
                `;
            }).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showModal(title, message, icon = '🎉') {
            document.getElementById('modalIcon').innerHTML = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').innerHTML = message;
            document.getElementById('royalModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('royalModal').classList.remove('active');
        }
        
        // ============ INITIAL TRIGGERS ============
        setTimeout(() => {
            createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 15);
            canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.7 }, colors: ['#e8c97a', '#ffb7c5'] });
        }, 1000);
        
        console.log('%c👑 ROYAL INVITATION SYSTEM ACTIVATED 👑', 'color: #e8c97a; font-size: 18px; font-weight: bold;');
        console.log('%c✨ AI Effects | 3D Particles | Royal Design ✨', 'color: #ffb7c5; font-size: 14px;');
    </script>
</body>
