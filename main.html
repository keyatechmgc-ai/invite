<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mahmoud & Eman | عرس أحلامنا</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --pink: #e8a0b4;
            --pink-light: #f2c8d4;
            --pink-dark: #c47d8b;
            --pink-soft: #f9e4ea;
            --pink-pale: #fdf5f7;
            --white: #ffffff;
            --dark: #3d2c30;
            --dark-soft: #5c4549;
            --gold: #c9a87c;
            --gold-light: #e8d9c5;
            --gold-dark: #a8835a;
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.25);
            --gradient-gold: linear-gradient(135deg, #c9a87c 0%, #e8d9c5 50%, #c9a87c 100%);
            --gradient-pink: linear-gradient(135deg, #e8a0b4 0%, #f2c8d4 50%, #e8a0b4 100%);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--pink-pale);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* الخلفية العامة */
        .global-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .global-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.35;
        }
        .global-bg .overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(253,245,247,0.9) 0%, rgba(242,200,212,0.7) 100%);
        }

        /* AI Cursor */
        .ai-cursor {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,160,180,0.15) 0%, rgba(232,160,180,0.05) 40%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .ai-cursor.active { opacity: 1; }

        /* قلوب متطايرة */
        .heart {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            animation: heartFloat var(--d) ease-out forwards;
            font-size: var(--s);
        }
        @keyframes heartFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.9; }
            50% { transform: translateY(50vh) translateX(var(--x)) scale(var(--sc)) rotate(var(--r)); opacity: 0.9; }
            100% { transform: translateY(-10vh) translateX(var(--xe)) scale(0.2); opacity: 0; }
        }

        /* سباركلز */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 9996;
            animation: sparkleAnim var(--dur) ease-out forwards;
        }
        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            20% { transform: scale(1.5) rotate(45deg); opacity: 1; }
            100% { transform: scale(0) rotate(180deg); opacity: 0; }
        }

        /* Canvas للجزيئات */
        #particlesCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        /* الحاوية الرئيسية */
        .container {
            position: relative;
            z-index: 10;
            max-width: 550px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }

        /* البطاقة الرئيسية */
        .hero-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 35px 25px 45px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-xl);
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.7s var(--transition-smooth);
        }
        .hero-card.visible { opacity: 1; transform: translateY(0); }

        .frame {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 5px;
            background: var(--gradient-gold);
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(201,168,124,0.4); }
            50% { box-shadow: 0 0 0 20px rgba(201,168,124,0); }
        }
        .frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid white; }

        .hero-name { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 600; color: var(--pink-dark); }
        .hero-and { font-family: 'Great Vibes', cursive; font-size: 2rem; color: var(--gold); margin: 5px 0; }
        .event-badge { display: inline-block; padding: 8px 25px; background: var(--gradient-pink); color: white; border-radius: 40px; font-size: 0.7rem; letter-spacing: 3px; font-weight: 700; margin: 15px 0 20px; }

        .detail { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0; color: var(--dark-soft); }
        .detail-icon { width: 38px; height: 38px; background: rgba(232,160,180,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .invite-link { display: inline-block; margin-top: 20px; padding: 12px 30px; background: var(--gradient-gold); color: white; text-decoration: none; border-radius: 35px; font-weight: 700; }

        /* الصورة السفلية */
        .bottom-card {
            margin: 20px 0 25px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s var(--transition-smooth);
        }
        .bottom-card.visible { opacity: 1; transform: translateY(0); }
        .bottom-card img { width: 100%; height: 200px; object-fit: cover; display: block; }

        /* الكاونتر */
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s var(--transition-smooth);
        }
        .countdown.visible { opacity: 1; transform: translateY(0); }
        .count-item {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 18px 8px;
            border-radius: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .count-item:hover { transform: translateY(-5px); background: white; }
        .count-item.animate { animation: pop 0.4s var(--transition-bounce); }
        @keyframes pop {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08); background: white; }
        }
        .count-num { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 800; color: var(--pink-dark); display: block; }
        .count-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gold-dark); font-weight: 700; margin-top: 6px; }

        /* الفورم */
        .form-card, .comments-card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(12px);
            border-radius: 42px;
            padding: 30px 22px;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.7s var(--transition-smooth);
        }
        .form-card.visible, .comments-card.visible { opacity: 1; transform: translateY(0); }

        .form-title, .comments-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            text-align: center;
            color: var(--pink-dark);
            margin-bottom: 25px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(232,160,180,0.2);
            border-radius: 24px;
            font-family: 'Cairo', sans-serif;
            background: white;
            margin-bottom: 18px;
            outline: none;
        }
        .side-btns { display: flex; gap: 12px; margin-bottom: 18px; }
        .side-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(232,160,180,0.2);
            border-radius: 28px;
            background: white;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .side-btn.active { background: var(--gradient-pink); border-color: transparent; color: white; transform: translateY(-2px); }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-pink);
            border: none;
            border-radius: 35px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .filter-tab {
            padding: 8px 20px;
            border: 2px solid rgba(232,160,180,0.2);
            border-radius: 30px;
            background: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }
        .filter-tab.active { background: var(--gradient-pink); color: white; }

        .comments-list { max-height: 450px; overflow-y: auto; }
        .comment {
            background: rgba(253,245,247,0.7);
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 12px;
            border-right: 3px solid var(--pink);
        }
        .comment-badge { display: inline-block; padding: 4px 12px; background: var(--gradient-pink); color: white; border-radius: 20px; font-size: 0.7rem; font-weight: 700; margin-bottom: 8px; }
        .comment-name { font-weight: 800; margin-left: 10px; }
        .comment-msg { color: #666; font-size: 0.85rem; margin-top: 8px; }

        /* لوحة التحكم */
        .admin-panel {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100000;
            display: none;
            overflow-y: auto;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        .admin-panel.active { display: flex; }
        .admin-card {
            background: #1a0a0f;
            border-radius: 40px;
            padding: 35px 25px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--gold);
        }
        .admin-title { color: var(--gold-light); font-size: 1.6rem; text-align: center; margin-bottom: 25px; }
        .admin-label { color: rgba(255,255,255,0.7); font-size: 0.75rem; display: block; margin-bottom: 5px; }
        .admin-input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            color: white;
            margin-bottom: 15px;
        }
        .admin-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .admin-btn-primary { background: var(--gradient-gold); color: #1a0a0f; }
        .admin-btn-danger { background: linear-gradient(135deg, #f5576c, #c44569); color: white; }

        /* مودال */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 50px;
            padding: 40px 30px;
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .footer { text-align: center; padding: 30px 20px; color: var(--gold-dark); font-size: 0.7rem; }

        @media (max-width: 480px) {
            .hero-name { font-size: 2rem; }
            .count-num { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

            <label class="admin-label">👰 اسم العريس</label><input type="text" id="adminGroom" class="admin-input">

    <!-- مودال -->

    <script>
        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCF-kh6JgAbhroue7cKRdMZjwYV8m2c6Uw",
            authDomain: "engagmen.firebaseapp.com",
            databaseURL: "https://engagmen-default-rtdb.firebaseio.com",
            projectId: "engagmen",
            storageBucket: "engagmen.firebasestorage.app",
            messagingSenderId: "286100738965",
            appId: "1:286100738965:web:3f5be0307dca5927e5dc9c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Cloudinary
        const CLOUD_NAME = 'dsuv6suzb';
        const UPLOAD_PRESET = 'wedding_upload';

        let selectedSide = '';
        let allWishes = [];
        let currentFilter = 'all';
        let targetDate = new Date(2026, 7, 8, 19, 0, 0).getTime();
        let adminClicks = 0;

        // Elements
        const bgImg = document.getElementById('bgImage');
        const bottomImg = document.getElementById('bottomImg');

        // ============ AI PARTICLES ============
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 4 + 1,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.2,
                color: `rgba(232,160,180,${Math.random() * 0.3 + 0.1})`,
                phase: Math.random() * Math.PI * 2
            });
        }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX + Math.sin(p.phase) * 0.05;
                p.y += p.speedY + Math.cos(p.phase) * 0.05;
                p.phase += 0.01;
                if (p.x < -50) p.x = canvas.width + 50;
                if (p.x > canvas.width + 50) p.x = -50;
                if (p.y < -50) p.y = canvas.height + 50;
                if (p.y > canvas.height + 50) p.y = -50;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============ AI HEARTS & SPARKLES ============
        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            const size = Math.random() * 25 + 15;
            heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘', '💝'][Math.floor(Math.random() * 6)];
            heart.style.cssText = `left: ${x}px; font-size: ${size}px; --d: ${Math.random() * 4 + 4}s; --x: ${(Math.random() - 0.5) * 150}px; --xe: ${(Math.random() - 0.5) * 100}px; --r: ${(Math.random() - 0.5) * 180}deg; --sc: ${Math.random() * 0.6 + 0.7};`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        function createSparkle(x, y) {
            for (let i = 0; i < 5; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.innerHTML = ['✨', '⭐', '💫', '🌟'][Math.floor(Math.random() * 4)];
                s.style.cssText = `left: ${x + (Math.random() - 0.5) * 80}px; top: ${y + (Math.random() - 0.5) * 80}px; font-size: ${Math.random() * 16 + 10}px; --dur: ${Math.random() * 1 + 0.8}s;`;
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }
        }

        // AI Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.classList.add('active');
            if (Math.random() > 0.95) createHeart(e.clientX, e.clientY);
        });
        document.addEventListener('mouseleave', () => cursor.classList.remove('active'));

        setInterval(() => { if (Math.random() > 0.7) createHeart(Math.random() * window.innerWidth, window.innerHeight - 50); }, 800);
        setInterval(() => { if (Math.random() > 0.85) createSparkle(Math.random() * window.innerWidth, Math.random() * window.innerHeight); }, 1500);

        // ============ SCROLL REVEAL ============
        const scrollElements = document.querySelectorAll('.scroll');
        function checkScroll() {
            scrollElements.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) {
                    el.classList.add('visible');
                    if (Math.random() > 0.8) createSparkle(rect.left + rect.width/2, rect.top + 10);
                }
            });
        }
        window.addEventListener('scroll', checkScroll);
        window.addEventListener('load', checkScroll);
        setTimeout(checkScroll, 500);

        // ============ COUNTDOWN ============
        function updateCountdown() {
            const diff = targetDate - Date.now();
            if (diff <= 0) {
                ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).textContent = '00');
                return;
            }
            document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
            document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
            document.getElementById('minutes').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
            document.getElementById('seconds').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
            
            if (Math.random() > 0.7) {
                const boxes = ['daysBox', 'hoursBox', 'minutesBox', 'secondsBox'];
                const box = document.getElementById(boxes[Math.floor(Math.random() * 4)]);
                box.classList.add('animate');
                setTimeout(() => box.classList.remove('animate'), 400);
            }
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // ============ ADMIN (10 clicks on seconds) ============
        document.getElementById('secondsBox').addEventListener('click', () => {
            adminClicks++;
            setTimeout(() => { if (adminClicks < 10) adminClicks = 0; }, 3000);
            if (adminClicks >= 10) {
                document.getElementById('adminPanel').classList.add('active');
                loadToAdmin();
                adminClicks = 0;
            }
        });

        function loadToAdmin() {
            document.getElementById('adminGroom').value = document.getElementById('groomName').textContent;
            document.getElementById('adminBride').value = document.getElementById('brideName').textContent;
            document.getElementById('adminLabel').value = document.getElementById('eventLabel').textContent;
            document.getElementById('adminDate').value = document.getElementById('eventDate').textContent.replace(/\s/g, '');
            document.getElementById('adminTime').value = document.getElementById('eventTime').textContent;
            document.getElementById('adminVenue').value = document.getElementById('eventVenue').textContent;
            document.getElementById('adminLink').value = document.getElementById('locationLink').href;
            document.getElementById('adminBg').value = bgImg.src;
            document.getElementById('adminBottom').value = bottomImg.src;
        }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('active'); }

        // Upload functions
        function uploadBg() {
            cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local', 'url'] }, (err, res) => {
                if (res && res.event === 'success') { bgImg.src = res.info.secure_url; document.getElementById('adminBg').value = res.info.secure_url; db.ref('settings/bg').set(res.info.secure_url); }
            });
        }
        function uploadBottom() {
            cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local', 'url'] }, (err, res) => {
                if (res && res.event === 'success') { bottomImg.src = res.info.secure_url; document.getElementById('adminBottom').value = res.info.secure_url; db.ref('settings/bottom').set(res.info.secure_url); }
            });
        }
        function resetBg() { const def = 'https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg'; bgImg.src = def; document.getElementById('adminBg').value = def; db.ref('settings/bg').set(def); }
        function resetBottom() { const def = 'https://i.pinimg.com/736x/47/aa/57/47aa57cabff46306447e777ac52e8a8e.jpg'; bottomImg.src = def; document.getElementById('adminBottom').value = def; db.ref('settings/bottom').set(def); }

        function saveSettings() {
            const s = {
                groom: document.getElementById('adminGroom').value,
                bride: document.getElementById('adminBride').value,
                label: document.getElementById('adminLabel').value,
                date: document.getElementById('adminDate').value,
                time: document.getElementById('adminTime').value,
                venue: document.getElementById('adminVenue').value,
                link: document.getElementById('adminLink').value,
                bg: bgImg.src,
                bottom: bottomImg.src
            };
            document.getElementById('groomName').textContent = s.groom;
            document.getElementById('brideName').textContent = s.bride;
            document.getElementById('eventLabel').textContent = s.label;
            document.getElementById('eventDate').textContent = s.date;
            document.getElementById('eventTime').textContent = s.time;
            document.getElementById('eventVenue').textContent = s.venue;
            document.getElementById('locationLink').href = s.link;
            db.ref('settings').set(s);
            showModal('✅ تم الحفظ', 'تم حفظ جميع الإعدادات بنجاح!');
        }

        // Load settings from FB
        db.ref('settings').on('value', snap => {
            const data = snap.val();
            if (data) {
                if (data.groom) document.getElementById('groomName').textContent = data.groom;
                if (data.bride) document.getElementById('brideName').textContent = data.bride;
                if (data.label) document.getElementById('eventLabel').textContent = data.label;
                if (data.date) document.getElementById('eventDate').textContent = data.date;
                if (data.time) document.getElementById('eventTime').textContent = data.time;
                if (data.venue) document.getElementById('eventVenue').textContent = data.venue;
                if (data.link) document.getElementById('locationLink').href = data.link;
                if (data.bg) bgImg.src = data.bg;
                if (data.bottom) bottomImg.src = data.bottom;
            }
        });

        // Load couple image from envelope settings
        db.ref('envelopeSettings').on('value', snap => {
            const data = snap.val();
            if (data) {
                if (data.groomName) document.getElementById('groomName').textContent = data.groomName;
                if (data.brideName) document.getElementById('brideName').textContent = data.brideName;
            }
        });

        // ============ RSVP ============
        function selectSide(side, el) {
            selectedSide = side;
            document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }
        function submitRSVP() {
            const name = document.getElementById('guestName').value.trim();
            const status = document.getElementById('guestStatus').value;
            const msg = document.getElementById('guestMessage').value.trim();
            if (!name || !selectedSide) { showModal('تنبيه', 'يرجى إدخال الاسم واختيار الطرف'); return; }
            db.ref('wishes').push({ name, side: selectedSide, status, message: msg, timestamp: firebase.database.ServerValue.TIMESTAMP }).then(() => {
                showModal('🎉 تم الإرسال', `شكراً ${name} على تهنئتك!`);
                document.getElementById('guestName').value = '';
                document.getElementById('guestMessage').value = '';
                document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
                selectedSide = '';
                canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#e8a0b4', '#c9a87c'] });
                createSparkle(window.innerWidth/2, window.innerHeight/2);
            }).catch(() => showModal('خطأ', 'حدث خطأ، حاول مرة أخرى'));
        }

        db.ref('wishes').orderByChild('timestamp').on('value', snap => {
            allWishes = [];
            snap.forEach(child => { allWishes.unshift({ id: child.key, ...child.val() }); });
            renderWishes();
        });
        function filterWishes(type, el) {
            currentFilter = type;
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
            renderWishes();
        }
        function renderWishes() {
            const list = document.getElementById('wishesList');
            let filtered = currentFilter === 'all' ? allWishes : allWishes.filter(w => w.side === currentFilter);
            if (filtered.length === 0) { list.innerHTML = '<div style="text-align:center;padding:40px;">✨ لا توجد تهاني بعد ✨</div>'; return; }
            list.innerHTML = filtered.map(w => `<div class="comment"><span class="comment-badge">${w.side === 'عريس' ? 'العريس' : 'العروسة'}</span><span class="comment-name">${escapeHtml(w.name)}</span><div class="comment-msg">${w.message ? '"' + escapeHtml(w.message) + '"' : '❤️'}</div></div>`).join('');
        }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function showModal(title, msg) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalMessage').innerHTML = msg; document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
    </script>
</body>
</html>
