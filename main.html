<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mahmoud & Eman | مملكة الحب</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- Cloudinary -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --pink: #ffb7c5;
            --pink-deep: #ff8da3;
            --pink-dark: #d46b81;
            --pink-royal: #c94f6b;
            --gold: #e8c97a;
            --gold-dark: #c9a84c;
            --white: #ffffff;
            --dark: #2a1a1f;
            --shadow-royal: 0 30px 60px rgba(0,0,0,0.15);
            --gradient-royal: linear-gradient(135deg, #ffb7c5 0%, #ff8da3 25%, #e8c97a 50%, #ff8da3 75%, #ffb7c5 100%);
            --gradient-gold: linear-gradient(135deg, #e8c97a 0%, #c9a84c 50%, #e8c97a 100%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #1a0e12;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* خلفية */
        .royal-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }
        .royal-bg-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.55;
            animation: slowZoom 5s ease-in-out infinite alternate;
        }
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        .royal-bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(26,14,18,0.3) 0%, rgba(26,14,18,0.6) 100%);
        }
        .royal-bg-particles {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,183,197,0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: particleDrift 60s linear infinite;
        }
        @keyframes particleDrift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        /* كيرسر */
        .royal-cursor {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,183,197,0.12) 0%, rgba(255,141,163,0.06) 40%, transparent 70%);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .royal-cursor.active { opacity: 1; }

        /* قلوب */
        .royal-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            filter: drop-shadow(0 0 10px rgba(255,183,197,0.8));
            animation: royalHeartFloat var(--dur) cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes royalHeartFloat {
            0% { transform: translateY(100vh) translateX(0) scale(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            50% { transform: translateY(40vh) translateX(var(--dx)) scale(var(--sc)) rotate(var(--rot)); opacity: 1; }
            100% { transform: translateY(-15vh) translateX(var(--dxe)) scale(0.2) rotate(calc(var(--rot) + 180deg)); opacity: 0; }
        }

        /* ورد */
        .royal-flower {
            position: fixed;
            pointer-events: none;
            z-index: 9996;
            animation: royalFlowerFloat var(--dur) ease-out forwards;
        }
        @keyframes royalFlowerFloat {
            0% { transform: translateY(100vh) translateX(0) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.9; }
            50% { transform: translateY(30vh) translateX(var(--dx)) scale(var(--sc)) rotate(var(--rot)); opacity: 0.8; }
            100% { transform: translateY(-20vh) translateX(var(--dxe)) scale(0) rotate(calc(var(--rot) + 360deg)); opacity: 0; }
        }

        /* سباركلز */
        .royal-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 9995;
            animation: royalSparkleAnim var(--dur) ease-out forwards;
        }
        @keyframes royalSparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            25% { transform: scale(1.5) rotate(90deg); opacity: 1; }
            100% { transform: scale(0) rotate(270deg); opacity: 0; }
        }

        /* كانفاس */
        #royalParticlesCanvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        /* تأثير انقلاب الصفحة */
        .page-flip-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 100%);
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .flip-effect {
            position: fixed;
            inset: 0;
            z-index: 10001;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }
        .flip-card {
            width: 300px;
            height: 400px;
            background: linear-gradient(145deg, #fff9f7, #fff);
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(232,201,122,0.5);
            transform-style: preserve-3d;
        }

        /* حاوية رئيسية */
        .royal-container {
            position: relative;
            z-index: 10;
            max-width: 580px;
            margin: 0 auto;
            padding: 30px 20px 80px;
            opacity: 0;
        }
        .royal-container.visible {
            opacity: 1;
        }

        /* بطاقة */
        .royal-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.96) 0%, rgba(255,249,247,0.92) 100%);
            backdrop-filter: blur(20px);
            border-radius: 80px 80px 80px 40px;
            padding: 50px 30px 60px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-royal), 0 0 0 2px rgba(255,255,255,0.3), 0 0 0 6px rgba(232,201,122,0.2);
            position: relative;
            overflow: hidden;
        }

        .royal-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            border-radius: 50%;
            padding: 6px;
            background: var(--gradient-royal);
            animation: framePulse 3s ease-in-out infinite;
        }
        @keyframes framePulse {
            0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(232,201,122,0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 20px rgba(232,201,122,0); }
        }
        .royal-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
        }

        .royal-names { text-align: center; margin-bottom: 20px; }
        .royal-groom, .royal-bride {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            font-weight: 400;
            background: linear-gradient(135deg, #c94f6b, #e8c97a, #ffb7c5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .royal-and {
            display: block;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--gold-dark);
            margin: 5px 0;
        }

        .royal-badge {
            display: inline-block;
            padding: 10px 32px;
            background: var(--gradient-gold);
            color: #2a1a1f;
            border-radius: 60px;
            font-size: 0.75rem;
            letter-spacing: 5px;
            font-weight: 800;
            margin: 20px auto;
        }

        /* تفاصيل */
        .royal-details {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-top: 25px;
        }
        .royal-detail {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            max-width: 280px;
            gap: 15px;
            color: var(--dark);
            font-size: 1rem;
            padding: 8px 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 50px;
        }
        .royal-detail-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ffb7c5, #ff8da3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .royal-detail-text {
            flex: 1;
            text-align: right;
        }

        .royal-location-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
            padding: 14px 35px;
            background: linear-gradient(135deg, #2a1a1f, #3d2a30);
            color: var(--gold);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .royal-location-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: var(--gold-light);
        }

        /* كاونتر - معدل للشاشات الصغيرة */
        .royal-countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 30px 0;
        }
        .royal-count-item {
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,249,247,0.9));
            backdrop-filter: blur(10px);
            padding: 16px 8px;
            border-radius: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s;
            border: 1px solid rgba(232,201,122,0.3);
        }
        .royal-count-number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c94f6b, #e8c97a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: block;
        }
        .royal-count-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold-dark);
            font-weight: 700;
            margin-top: 6px;
        }

        /* فورم */
        .royal-form, .royal-comments {
            background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(255,249,247,0.92));
            backdrop-filter: blur(20px);
            border-radius: 55px;
            padding: 40px 28px;
            margin-bottom: 30px;
        }
        .royal-form-title, .royal-comments-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #c94f6b, #e8c97a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
        }

        .royal-input, .royal-select, .royal-textarea {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid rgba(232,201,122,0.2);
            border-radius: 35px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            background: white;
            margin-bottom: 20px;
            outline: none;
        }

        .royal-side-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .royal-side-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid rgba(232,201,122,0.3);
            border-radius: 40px;
            background: white;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
        }
        .royal-side-btn.active {
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            border-color: transparent;
            color: #2a1a1f;
        }

        .royal-submit {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #c94f6b, #e8c97a);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        /* فلاتر */
        .royal-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }
        .royal-filter {
            padding: 10px 24px;
            border: 2px solid rgba(232,201,122,0.3);
            border-radius: 40px;
            background: white;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
        }
        .royal-filter.active {
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            color: #2a1a1f;
        }

        /* تعليقات */
        .royal-comments-list {
            max-height: 450px;
            overflow-y: auto;
        }
        .royal-comment {
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 35px;
            margin-bottom: 15px;
            border-right: 5px solid var(--gold);
        }
        .royal-comment-badge {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #e8c97a, #c9a84c);
            color: #2a1a1f;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .royal-comment-name { font-weight: 800; color: var(--pink-dark); margin-left: 12px; }
        .royal-comment-status { font-size: 0.7rem; color: var(--gold-dark); margin-right: 10px; }
        .royal-comment-message { color: #555; font-size: 0.9rem; margin-top: 10px; }

        /* مودال */
        .royal-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 1000000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .royal-modal.active { display: flex; }
        .royal-modal-content {
            background: linear-gradient(145deg, #fff, #fff9f7);
            border-radius: 70px;
            padding: 50px 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
        }

        .royal-footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(232,201,122,0.6);
            font-size: 0.7rem;
        }

        /* شاشات صغيرة جداً */
        @media (max-width: 500px) {
            .royal-container { padding: 15px 12px 60px; }
            .royal-card { padding: 30px 18px 40px; border-radius: 50px; }
            .royal-groom, .royal-bride { font-size: 2.2rem; }
            .royal-and { font-size: 1.8rem; }
            .royal-countdown { gap: 8px; }
            .royal-count-item { padding: 12px 5px; border-radius: 22px; }
            .royal-count-number { font-size: 1.6rem; }
            .royal-count-label { font-size: 0.5rem; letter-spacing: 2px; }
            .royal-detail { max-width: 100%; padding: 6px 12px; }
            .royal-detail-icon { width: 36px; height: 36px; font-size: 1rem; }
            .royal-detail-text { font-size: 0.85rem; }
            .royal-form, .royal-comments { padding: 28px 18px; }
            .royal-form-title, .royal-comments-title { font-size: 1.5rem; }
        }

        @media (max-width: 380px) {
            .royal-count-number { font-size: 1.3rem; }
            .royal-count-label { font-size: 0.45rem; letter-spacing: 1px; }
            .royal-count-item { padding: 10px 4px; }
        }
    </style>
</head>
<body>

    <!-- خلفية -->
    <div class="royal-bg">
        <img class="royal-bg-image" id="globalBgImage" src="" alt="">
        <div class="royal-bg-overlay"></div>
        <div class="royal-bg-particles"></div>
    </div>

    <!-- كيرسر -->
    <div class="royal-cursor" id="royalCursor"></div>

    <!-- تأثير انقلاب الصفحة -->
    <div class="page-flip-overlay" id="flipOverlay"></div>
    <div class="flip-effect" id="flipEffect">
        <div class="flip-card" id="flipCard"></div>
    </div>

    <!-- كانفاس -->
    <canvas id="royalParticlesCanvas"></canvas>

    <!-- حاوية رئيسية -->
    <div class="royal-container" id="mainContainer">
        <div class="royal-card" id="heroCard">
            <div class="royal-frame"><img id="coupleImage" src="" alt="Couple"></div>
            <div class="royal-names">
                <div class="royal-groom" id="groomName"></div>
                <div class="royal-and">&</div>
                <div class="royal-bride" id="brideName"></div>
            </div>
            <div style="text-align: center;"><span class="royal-badge" id="eventLabel"></span></div>
            <div class="royal-details">
                <div class="royal-detail"><span class="royal-detail-icon">📅</span><span class="royal-detail-text" id="eventDate"></span></div>
                <div class="royal-detail"><span class="royal-detail-icon">🕖</span><span class="royal-detail-text" id="eventTime"></span></div>
                <div class="royal-detail"><span class="royal-detail-icon">📍</span><span class="royal-detail-text" id="eventVenue"></span></div>
            </div>
            <div style="text-align: center;">
                <a href="#" id="locationLink" target="_blank" class="royal-location-btn">📍 تحديد موقع القاعة</a>
            </div>
        </div>

        <div class="royal-countdown" id="countdownWrapper">
            <div class="royal-count-item" id="daysBox"><span class="royal-count-number" id="days">00</span><span class="royal-count-label">Days</span></div>
            <div class="royal-count-item" id="hoursBox"><span class="royal-count-number" id="hours">00</span><span class="royal-count-label">Hours</span></div>
            <div class="royal-count-item" id="minutesBox"><span class="royal-count-number" id="minutes">00</span><span class="royal-count-label">Minutes</span></div>
            <div class="royal-count-item" id="secondsBox"><span class="royal-count-number" id="seconds">00</span><span class="royal-count-label">Seconds</span></div>
        </div>

        <div class="royal-form">
            <div class="royal-form-title">تأكيد الحضور</div>
            <input type="text" id="guestName" class="royal-input" placeholder="الاسم الكريم">
            <div class="royal-side-btns">
                <div class="royal-side-btn" onclick="selectSide('عريس', this)">عريس</div>
                <div class="royal-side-btn" onclick="selectSide('عروسة', this)">عروسة</div>
            </div>
            <select id="guestStatus" class="royal-select">
                <option value="حاضر">بإذن الله سأحضر</option>
                <option value="ربما">سأحاول الحضور</option>
                <option value="معتذر">أعتذر لظروف خاصة</option>
            </select>
            <textarea id="guestMessage" class="royal-textarea" rows="3" placeholder="رسالة تهنئة..."></textarea>
            <button class="royal-submit" onclick="submitRSVP()">إرسال التهنئة</button>
        </div>

        <div class="royal-comments">
            <div class="royal-comments-title">التهاني والبركات</div>
            <div class="royal-filters">
                <button class="royal-filter active" onclick="filterWishes('all', this)">الكل</button>
                <button class="royal-filter" onclick="filterWishes('عريس', this)">العريس</button>
                <button class="royal-filter" onclick="filterWishes('عروسة', this)">العروسة</button>
            </div>
            <div class="royal-comments-list" id="wishesList"></div>
        </div>

        <div class="royal-footer">جميع الحقوق محفوظة لنقابة تكنولوجيا المعلومات والبرمجيات المصرية 2026</div>
    </div>

    <!-- مودال -->
    <div class="royal-modal" id="royalModal">
        <div class="royal-modal-content">
            <div style="font-size: 3rem;" id="modalIcon">🎉</div>
            <div class="royal-form-title" style="font-size: 1.6rem;" id="modalTitle"></div>
            <div style="color: #666; margin: 15px 0;" id="modalMessage"></div>
            <button class="royal-submit" onclick="closeModal()">حسناً</button>
        </div>
    </div>

    <!-- صوت -->
    <audio id="bgMusic" preload="auto" loop style="position:fixed;top:-100px;left:-100px;width:1px;height:1px;opacity:0;pointer-events:none;"></audio>

    <script>
        // ============ FIREBASE ============
        const firebaseConfig = {
            apiKey: "AIzaSyCF-kh6JgAbhroue7cKRdMZjwYV8m2c6Uw",
            authDomain: "engagmen.firebaseapp.com",
            databaseURL: "https://engagmen-default-rtdb.firebaseio.com",
            projectId: "engagmen",
            storageBucket: "engagmen.firebasestorage.app",
            messagingSenderId: "286100738965",
            appId: "1:286100738965:web:3f5be0307dca5927e5dc9c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============ STATE ============
        let selectedSide = '';
        let allWishes = [];
        let currentFilter = 'all';
        let targetDate = new Date().getTime() + 86400000;
        let musicStarted = false;
        
        // ============ ELEMENTS ============
        const globalBg = document.getElementById('globalBgImage');
        const coupleImage = document.getElementById('coupleImage');
        const music = document.getElementById('bgMusic');
        
        // ============ MUSIC SETUP ============
        function setupMusic() {
            music.volume = 0.7;
            
            function playMusic() {
                if (!musicStarted) {
                    music.play().then(() => {
                        musicStarted = true;
                        console.log('✅ Music started');
                    }).catch(() => {});
                }
            }
            
            document.body.addEventListener('click', playMusic);
            document.body.addEventListener('touchstart', playMusic);
            
            music.addEventListener('ended', () => {
                music.currentTime = 0;
                music.play().catch(() => {});
            });
        }
        
        // ============ LOAD ALL DATA FROM FIREBASE ============
        function loadAllData() {
            // تحميل إعدادات الصفحة الرئيسية
            db.ref('mainSettings').on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    // الأسماء
                    document.getElementById('groomName').textContent = data.groom || 'Mahmoud';
                    document.getElementById('brideName').textContent = data.bride || 'Eman';
                    document.getElementById('eventLabel').textContent = data.eventLabel || 'We\'re Getting Married!';
                    
                    // التاريخ والوقت والمكان
                    document.getElementById('eventDate').textContent = data.eventDate || '08 . 08 . 2026';
                    document.getElementById('eventTime').textContent = data.eventTime || '7:00 PM';
                    document.getElementById('eventVenue').textContent = data.venue || 'Diva Hall';
                    document.getElementById('locationLink').href = data.locationLink || '#';
                    
                    // الصور
                    if (data.globalBg) globalBg.src = data.globalBg;
                    if (data.coupleImage) coupleImage.src = data.coupleImage;
                    
                    // الموسيقى
                    if (data.musicUrl && data.musicUrl !== music.src) {
                        music.src = data.musicUrl;
                        music.load();
                    }
                    
                    // الكاونتر
                    if (data.countdownDate) {
                        const countdownDate = new Date(data.countdownDate);
                        if (!isNaN(countdownDate.getTime())) {
                            targetDate = countdownDate.getTime();
                            updateCountdown();
                        }
                    }
                }
            });
            
            // تحميل التعليقات
            db.ref('wishes').orderByChild('timestamp').on('value', (snap) => {
                allWishes = [];
                snap.forEach(child => {
                    allWishes.unshift({ id: child.key, ...child.val() });
                });
                renderWishes();
                updateStats();
            });
        }
        
        // ============ COUNTDOWN ============
        function updateCountdown() {
            const diff = targetDate - Date.now();
            if (diff <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }
            document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
            document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
            document.getElementById('minutes').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
            document.getElementById('seconds').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
            
            // أنيميشن عشوائي للكاونتر
            if (Math.random() > 0.85) {
                const boxes = ['daysBox', 'hoursBox', 'minutesBox', 'secondsBox'];
                const box = document.getElementById(boxes[Math.floor(Math.random() * 4)]);
                if (box) {
                    gsap.to(box, { scale: 1.05, duration: 0.2, yoyo: true, repeat: 1, ease: 'power2.out' });
                }
            }
        }
        setInterval(updateCountdown, 1000);
        
        // ============ PARTICLES ============
        const canvas = document.getElementById('royalParticlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 4 + 1,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.2,
                color: `rgba(${Math.random() > 0.5 ? '232,201,122' : '255,183,197'}, ${Math.random() * 0.3 + 0.1})`,
                phase: Math.random() * Math.PI * 2
            });
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX + Math.sin(p.phase) * 0.05;
                p.y += p.speedY + Math.cos(p.phase) * 0.05;
                p.phase += 0.01;
                if (p.x < -50) p.x = canvas.width + 50;
                if (p.x > canvas.width + 50) p.x = -50;
                if (p.y < -50) p.y = canvas.height + 50;
                if (p.y > canvas.height + 50) p.y = -50;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        // ============ AI EFFECTS ============
        function createRoyalHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'royal-heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💕', '💘', '💝'][Math.floor(Math.random() * 6)];
            heart.style.cssText = `left: ${x}px; font-size: ${Math.random() * 25 + 18}px; --dur: ${Math.random() * 4 + 4}s; --dx: ${(Math.random() - 0.5) * 180}px; --dxe: ${(Math.random() - 0.5) * 120}px; --rot: ${(Math.random() - 0.5) * 200}deg; --sc: ${Math.random() * 0.6 + 0.7};`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        
        function createRoyalFlower(x, y) {
            const flower = document.createElement('div');
            flower.className = 'royal-flower';
            flower.innerHTML = ['🌸', '🌹', '💮', '🏵️', '🌺', '🌼'][Math.floor(Math.random() * 6)];
            flower.style.cssText = `left: ${x}px; font-size: ${Math.random() * 24 + 16}px; --dur: ${Math.random() * 4 + 4}s; --dx: ${(Math.random() - 0.5) * 150}px; --dxe: ${(Math.random() - 0.5) * 100}px; --rot: ${(Math.random() - 0.5) * 360}deg; --sc: ${Math.random() * 0.5 + 0.6};`;
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 8000);
        }
        
        function createRoyalSparkle(x, y, count = 2) {
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                s.className = 'royal-sparkle';
                s.innerHTML = ['✨', '⭐', '🌟', '💫', '⚜️'][Math.floor(Math.random() * 5)];
                s.style.cssText = `left: ${x + (Math.random() - 0.5) * 100}px; top: ${y + (Math.random() - 0.5) * 100}px; font-size: ${Math.random() * 18 + 10}px; --dur: ${Math.random() * 1 + 0.8}s;`;
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }
        }
        
        // ============ CURSOR ============
        const cursor = document.getElementById('royalCursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursor.classList.add('active');
            if (Math.random() > 0.98) {
                createRoyalHeart(e.clientX, e.clientY);
            }
        });
        document.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        
        setInterval(() => {
            if (Math.random() > 0.7) {
                createRoyalHeart(Math.random() * window.innerWidth, window.innerHeight - 30);
            }
        }, 800);
        
        setInterval(() => {
            if (Math.random() > 0.8) {
                createRoyalFlower(Math.random() * window.innerWidth, window.innerHeight - 50);
            }
        }, 1000);
        
        setInterval(() => {
            if (Math.random() > 0.85) {
                createRoyalSparkle(Math.random() * window.innerWidth, Math.random() * window.innerHeight, 1);
            }
        }, 1200);
        
        // ============ PAGE ENTRANCE EFFECT ============
        function startPageFlipEffect() {
            const flipOverlay = document.getElementById('flipOverlay');
            const flipEffect = document.getElementById('flipEffect');
            const flipCard = document.getElementById('flipCard');
            const mainContainer = document.getElementById('mainContainer');
            
            flipOverlay.style.opacity = '1';
            flipEffect.style.opacity = '1';
            
            gsap.fromTo(flipCard, 
                { rotationY: -180, scale: 0.5, opacity: 0 },
                { rotationY: 0, scale: 1, opacity: 1, duration: 1.2, ease: 'back.out(1.5)', onComplete: () => {
                    gsap.to(flipCard, { scale: 1.2, opacity: 0, duration: 0.5, delay: 0.3 });
                    gsap.to(flipOverlay, { opacity: 0, duration: 0.5, delay: 0.5 });
                    gsap.to(flipEffect, { opacity: 0, duration: 0.5, delay: 0.5 });
                    gsap.to(mainContainer, { opacity: 1, duration: 0.8, delay: 0.3 });
                }}
            );
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    createRoyalFlower(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                    createRoyalHeart(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                }, i * 50);
            }
            
            canvasConfetti({ particleCount: 500, spread: 180, origin: { y: 0.5 }, colors: ['#ffb7c5', '#ff8da3', '#e8c97a', '#c94f6b'], startVelocity: 25 });
            setTimeout(() => {
                canvasConfetti({ particleCount: 300, spread: 120, origin: { y: 0.4, x: 0.3 }, colors: ['#ffb7c5', '#e8c97a'] });
                canvasConfetti({ particleCount: 300, spread: 120, origin: { y: 0.4, x: 0.7 }, colors: ['#ff8da3', '#c94f6b'] });
            }, 500);
        }
        
        // ============ RSVP FUNCTIONS ============
        function selectSide(side, el) {
            selectedSide = side;
            document.querySelectorAll('.royal-side-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            createRoyalSparkle(el.getBoundingClientRect().left + el.offsetWidth/2, el.getBoundingClientRect().top + el.offsetHeight/2, 3);
        }
        
        function getResponseMessage(name, status, side) {
            const sideText = side === 'عريس' ? 'العريس' : 'العروسة';
            if (status === 'حاضر') {
                return `🎉 أهلاً وسهلاً يا ${name}!\n\nتشرفت خطوبتنا بحضورك الكريم من طرف ${sideText}\nنورت الفرحة بوجودك يا غالي\nنراك على خير إن شاء الله`;
            } else if (status === 'ربما') {
                return `🌸 إن شاء الله يا ${name}!\n\nبإذن الله تكون معانا وتشاركنا فرحتنا من طرف ${sideText}\nربنا يسهلك أمورك ونجتمع على خير\nمستنيينك بفارغ الصبر`;
            } else {
                return `💐 تسلم يا ${name}!\n\nقدرنا ظروفك وغيابك عن خطوبتنا هيكون له أثر\nمن طرف ${sideText}\nمحبتك في قلوبنا دايمًا\nوإن شاء الله في مناسبة قريبة نتقابل`;
            }
        }
        
        function submitRSVP() {
            const name = document.getElementById('guestName').value.trim();
            const status = document.getElementById('guestStatus').value;
            const message = document.getElementById('guestMessage').value.trim();
            
            if (!name || !selectedSide) {
                showModal('تنبيه', 'يرجى إدخال الاسم واختيار الطرف', '⚠️');
                return;
            }
            
            db.ref('wishes').push({
                name, side: selectedSide, status, message,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                const responseMessage = getResponseMessage(name, status, selectedSide);
                showModal('تم الإرسال', responseMessage, '💝');
                document.getElementById('guestName').value = '';
                document.getElementById('guestMessage').value = '';
                document.querySelectorAll('.royal-side-btn').forEach(btn => btn.classList.remove('active'));
                selectedSide = '';
                createRoyalSparkle(window.innerWidth/2, window.innerHeight/2, 20);
                canvasConfetti({ particleCount: 400, spread: 150, origin: { y: 0.6 }, colors: ['#e8c97a', '#ffb7c5', '#c94f6b'] });
            }).catch(() => showModal('خطأ', 'حدث خطأ، حاول مرة أخرى', '❌'));
        }
        
        // ============ WISHES RENDERING ============
        function filterWishes(type, el) {
            currentFilter = type;
            document.querySelectorAll('.royal-filter').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
            renderWishes();
        }
        
        function renderWishes() {
            const list = document.getElementById('wishesList');
            let filtered = currentFilter === 'all' ? allWishes : allWishes.filter(w => w.side === currentFilter);
            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:50px;color:#999;">✨ لا توجد تهاني بعد ✨</div>';
                return;
            }
            list.innerHTML = filtered.map(w => `
                <div class="royal-comment">
                    <span class="royal-comment-badge">${w.side === 'عريس' ? 'العريس' : 'العروسة'}</span>
                    <span class="royal-comment-name">${escapeHtml(w.name)}</span>
                    <span class="royal-comment-status">${w.status === 'حاضر' ? 'حاضر' : w.status === 'ربما' ? 'سيحاول' : 'معتذر'}</span>
                    ${w.message ? `<div class="royal-comment-message">"${escapeHtml(w.message)}"</div>` : '<div class="royal-comment-message">❤️</div>'}
                </div>
            `).join('');
        }
        
        function updateStats() {
            const total = allWishes.length;
            const present = allWishes.filter(w => w.status === 'حاضر').length;
            const maybe = allWishes.filter(w => w.status === 'ربما').length;
            const excused = allWishes.filter(w => w.status === 'معتذر').length;
            const groom = allWishes.filter(w => w.side === 'عريس').length;
            const bride = allWishes.filter(w => w.side === 'عروسة').length;
            
            const statTotal = document.getElementById('statTotal');
            const statPresent = document.getElementById('statPresent');
            const statMaybe = document.getElementById('statMaybe');
            const statExcused = document.getElementById('statExcused');
            const statGroom = document.getElementById('statGroom');
            const statBride = document.getElementById('statBride');
            
            if (statTotal) statTotal.textContent = total;
            if (statPresent) statPresent.textContent = present;
            if (statMaybe) statMaybe.textContent = maybe;
            if (statExcused) statExcused.textContent = excused;
            if (statGroom) statGroom.textContent = groom;
            if (statBride) statBride.textContent = bride;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showModal(title, message, icon = '🎉') {
            document.getElementById('modalIcon').innerHTML = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').innerHTML = message;
            document.getElementById('royalModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('royalModal').classList.remove('active');
        }
        
        // ============ GSAP SCROLL ============
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll('.royal-card, .royal-countdown, .royal-form, .royal-comments').forEach(el => {
            gsap.fromTo(el, 
                { opacity: 0, y: 50, scale: 0.96 },
                { opacity: 1, y: 0, scale: 1, duration: 0.8, scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none reverse' } }
            );
        });
        
        // ============ INIT ============
        setupMusic();
        loadAllData();
        setTimeout(() => {
            startPageFlipEffect();
        }, 200);
        
        console.log('%c👑 ROYAL MAIN PAGE - FULLY CONNECTED TO FIREBASE 👑', 'color: #e8c97a; font-size: 18px; font-weight: bold;');
        console.log('%c🎵 Countdown reads from Firebase | No local data', 'color: #ffb7c5; font-size: 14px;');
    </script>
</body>
</html>
